{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "langGraphCloud.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    {{- include "langGraphCloud.annotations" . | nindent 4 }}
    {{- with .Values.gateway.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "langGraphCloud.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    {{- if .Values.gateway.namespace }}
    namespace: {{ .Values.gateway.namespace }}
    {{- end }}
    {{- if .Values.gateway.sectionName }}
    sectionName: {{ .Values.gateway.sectionName }}
    {{- end }}
  {{- if .Values.gateway.hostname }}
  hostnames:
  - {{ .Values.gateway.hostname | quote }}
  {{- end }}
  {{- $bp := .Values.gateway.basePath | trimPrefix "/" | trimSuffix "/" }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        {{- if $bp }}
        value: /{{ $bp }}
        {{- else }}
        value: /
        {{- end }}
    {{- if $bp }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    {{- end }}
    backendRefs:
    - name: {{ include "langGraphCloud.fullname" . }}-{{ .Values.apiServer.name }}
      port: {{ .Values.apiServer.service.httpPort }}
{{- if and .Values.studio.enabled .Values.gateway.studioHostname }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "langGraphCloud.fullname" . }}-studio
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    {{- include "langGraphCloud.annotations" . | nindent 4 }}
    {{- with .Values.gateway.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "langGraphCloud.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    {{- if .Values.gateway.namespace }}
    namespace: {{ .Values.gateway.namespace }}
    {{- end }}
    {{- if .Values.gateway.sectionName }}
    sectionName: {{ .Values.gateway.sectionName }}
    {{- end }}
  hostnames:
  - {{ .Values.gateway.studioHostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "langGraphCloud.fullname" . }}-{{ .Values.studio.name }}
      port: {{ .Values.studio.service.httpPort }}
{{- end }}
{{- end }}
