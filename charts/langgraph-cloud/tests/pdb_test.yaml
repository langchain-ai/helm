suite: PDB minAvailable/maxUnavailable rendering
templates:
  - api-server/pdb.yaml
tests:
  - it: renders default minAvailable of 1 when nothing is overridden
    set:
      apiServer.pdb.enabled: true
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: renders minAvailable when explicitly set to 0
    set:
      apiServer.pdb.enabled: true
      apiServer.pdb.minAvailable: 0
    asserts:
      - equal:
          path: spec.minAvailable
          value: 0
      - notExists:
          path: spec.maxUnavailable

  - it: renders maxUnavailable set to 0 when minAvailable is removed
    set:
      apiServer.pdb.enabled: true
      apiServer.pdb.minAvailable: null
      apiServer.pdb.maxUnavailable: 0
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 0
      - notExists:
          path: spec.minAvailable
