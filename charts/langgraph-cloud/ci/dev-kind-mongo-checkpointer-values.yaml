# Local kind overlay for exercising the bundled Mongo default checkpointer in a
# disposable kind cluster.
checkpointer:
  default:
    backend: "mongo"
mongo:
  internal:
    enabled: true
    statefulSet:
      resources:
        limits:
          cpu: 250m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
      persistence:
        size: 2Gi
