# Copy to values.yaml and adjust for your cluster.
namespace: <namespace_name>

# Mission Control images.
backend:
  image: langsmith/langsmith-mission-control:backend-3.7.29
  pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  image: langsmith/langsmith-mission-control:frontend-3.7.29
  pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 200m
      memory: 256Mi

# Optional image pull secret for private registries.
imagePullSecrets:
  - name: regcred

# Deployment replica counts.
backendReplicas: 1
frontendReplicas: 1

# Internal services; port-forward is the default access path.
backendService:
  type: ClusterIP
  port: 8000

frontendService:
  type: ClusterIP
  port: 3000

# Optional ingress; disabled by default.
ingress:
  enabled: false
  host: ""

# Keep auth enabled in production.
auth:
  enabled: true

  # Pre-created Secret with username/password, or use the setup flow.
  existingSecret: mission-control-auth
  usernameKey: username
  passwordKey: password

  # Required when backendReplicas > 1; generate with: openssl rand -base64 32
  jwtSecretKey: ""

  # Required only when frontend and backend use different hostnames.
  allowedOrigins: ""

# Feature flags; set false to disable the UI feature and remove its write verbs.
features:
  # Allows deleting stuck pods from the Fix Issue button.
  fixIssue: true

  # Allows patching Helm ownership metadata onto existing resources.
  adopt: true

  # Enables SMTP and webhook alerts.
  alerts: true

  # Enables the chat assistant.
  chat: true

  # Enables downloadable diagnostic bundles.
  diagnostics: true

  # Allows saving draft configuration to a Kubernetes Secret.
  configSave: true

  # Enables namespace-scoped infrastructure discovery.
  discover: true

  # Enables database detection and DB support tools.
  dbTools: true

  # Enables in-browser Helm deploys; keep false unless explicitly needed.
  deploy: false

# Extra namespaces for discovery, comma-separated.
discoverNamespaces: ""

# Optional PVC for diagnostic bundles.
diagnostics:
  persistence:
    enabled: false

    # storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
