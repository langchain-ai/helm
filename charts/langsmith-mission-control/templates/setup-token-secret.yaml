{{- if .Values.auth.enabled }}
{{- $authSecretName := .Values.auth.existingSecret | default "mission-control-auth" }}
{{- $authSecret := lookup "v1" "Secret" .Release.Namespace $authSecretName }}
{{- if not $authSecret }}
{{- $setupTokenSecretName := printf "%s-setup-token" (include "langsmith-mission-control.fullname" .) }}
{{- $existingSetupToken := lookup "v1" "Secret" .Release.Namespace $setupTokenSecretName }}
{{- if not $existingSetupToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $setupTokenSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "langsmith-mission-control.name" . }}
type: Opaque
stringData:
  token: {{ randAlphaNum 43 }}
{{- end }}
{{- end }}
{{- end }}
