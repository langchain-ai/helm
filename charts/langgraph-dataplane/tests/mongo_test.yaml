suite: MongoDB templates
templates:
  - mongo/stateful-set.yaml
  - mongo/service.yaml
  - mongo/secrets.yaml
  - operator/deployment.yaml
  - operator/config-map.yaml
tests:
  - it: should not render mongo statefulset when mongo is disabled
    template: mongo/stateful-set.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render mongo service when mongo is disabled
    template: mongo/service.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render mongo secret when mongo is disabled
    template: mongo/secrets.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render mongo statefulset with correct name
    template: mongo/stateful-set.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langgraph-dataplane-mongo

  - it: should render mongo service as headless
    template: mongo/service.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langgraph-dataplane-mongo
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: should render mongo secret with connection URL
    template: mongo/secrets.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langgraph-dataplane-mongo
      - exists:
          path: data.mongodb_connection_url

  - it: should use the correct mongo image
    template: mongo/stateful-set.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "mongo:7"

  - it: should have a volumeClaimTemplate for persistence
    template: mongo/stateful-set.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 8Gi

  - it: should have startup, readiness, and liveness probes
    template: mongo/stateful-set.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - exists:
          path: spec.template.spec.containers[0].startupProbe
      - exists:
          path: spec.template.spec.containers[0].readinessProbe
      - exists:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should not render statefulset when external mongo is used
    template: mongo/stateful-set.yaml
    set:
      mongo.enabled: true
      mongo.external.enabled: true
      mongo.external.connectionUrl: "mongodb://external-host:27017/langgraph?replicaSet=rs0"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render service when external mongo is used
    template: mongo/service.yaml
    set:
      mongo.enabled: true
      mongo.external.enabled: true
      mongo.external.connectionUrl: "mongodb://external-host:27017/langgraph?replicaSet=rs0"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret with external connection URL
    template: mongo/secrets.yaml
    set:
      mongo.enabled: true
      mongo.external.enabled: true
      mongo.external.connectionUrl: "mongodb://external-host:27017/langgraph?replicaSet=rs0"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langgraph-dataplane-mongo

  - it: should inject default checkpointer env vars into the operator deployment when mongo is enabled
    template: operator/deployment.yaml
    set:
      mongo.enabled: true
      mongo.statefulSet.persistence.size: 8Gi
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_CHECKPOINTER_BACKEND
            value: "mongo"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_MONGODB_URI_SECRET_NAME
            value: "RELEASE-NAME-langgraph-dataplane-mongo"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_MONGODB_URI_SECRET_KEY
            value: "mongodb_connection_url"

  - it: should not inject default checkpointer env vars into the operator deployment when mongo is disabled
    template: operator/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_CHECKPOINTER_BACKEND
            value: "mongo"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_MONGODB_URI_SECRET_NAME
            value: "RELEASE-NAME-langgraph-dataplane-mongo"

  - it: should not render mongo secret when existingSecretName is provided
    template: mongo/secrets.yaml
    set:
      mongo.enabled: true
      mongo.external.enabled: true
      mongo.external.existingSecretName: "my-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference an existing secret in the operator deployment when provided
    template: operator/deployment.yaml
    set:
      mongo.enabled: true
      mongo.external.enabled: true
      mongo.external.existingSecretName: "my-secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_MONGODB_URI_SECRET_NAME
            value: "my-secret"

  - it: should fail when external mongo is enabled without mongo enabled
    template: operator/deployment.yaml
    set:
      mongo.external.enabled: true
      mongo.external.connectionUrl: "mongodb://external-host:27017/langgraph?replicaSet=rs0"
    asserts:
      - failedTemplate:
          errorMessage: "mongo.external.enabled requires mongo.enabled=true"
