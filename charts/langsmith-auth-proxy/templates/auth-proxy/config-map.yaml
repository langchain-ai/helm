{{- if .Values.authProxy.enabled }}
{{- $upstreamScheme := (urlParse .Values.authProxy.upstream).scheme -}}
{{- $upstreamHostname := include "authProxy.urlHostname" .Values.authProxy.upstream -}}
{{- $upstreamPort := include "authProxy.urlPort" .Values.authProxy.upstream -}}
{{- $upstreamPath := trimSuffix "/" (urlParse .Values.authProxy.upstream).path -}}
{{- $proxyEnabled := .Values.authProxy.httpProxy.enabled -}}
{{- $useProxy := false -}}
{{- if $proxyEnabled -}}
  {{- $useProxy = include "authProxy.shouldUseProxy" (dict "hostname" $upstreamHostname "noProxy" .Values.authProxy.httpProxy.noProxy) | trim | eq "true" -}}
{{- end -}}
{{- $jwksUri := .Values.authProxy.jwksUri -}}
{{- $jwksScheme := "" -}}
{{- $jwksHostname := "" -}}
{{- $jwksPort := "" -}}
{{- $useProxyForJwks := false -}}
{{- if $jwksUri -}}
  {{- $jwksScheme = (urlParse $jwksUri).scheme -}}
  {{- $jwksHostname = include "authProxy.urlHostname" $jwksUri -}}
  {{- $jwksPort = include "authProxy.urlPort" $jwksUri -}}
  {{- if $proxyEnabled -}}
    {{- $useProxyForJwks = include "authProxy.shouldUseProxy" (dict "hostname" $jwksHostname "noProxy" .Values.authProxy.httpProxy.noProxy) | trim | eq "true" -}}
  {{- end -}}
{{- end -}}
{{- $needsProxyCluster := or $useProxy $useProxyForJwks -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "authProxy.fullname" . }}-{{ .Values.authProxy.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "authProxy.labels" . | nindent 4 }}
  annotations:
    {{- include "authProxy.annotations" . | nindent 4 }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 10000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: upstream
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: {{ if $useProxy }}loopback_cluster{{ else }}upstream_provider{{ end }}
                                host_rewrite_literal: {{ $upstreamHostname }}
                                {{- if $upstreamPath }}
                                prefix_rewrite: "{{ $upstreamPath }}/"
                                {{- end }}
                                timeout: 0s
                                idle_timeout: {{ .Values.authProxy.streamIdleTimeout }}
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/healthz"
                      {{- if .Values.authProxy.jwtValidation.enabled }}
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            langsmith_jwt:
                              issuer: {{ .Values.authProxy.jwtIssuer }}
                              {{- if .Values.authProxy.jwtAudiences }}
                              audiences:
                                {{- range .Values.authProxy.jwtAudiences }}
                                - {{ . | quote }}
                                {{- end }}
                              {{- end }}
                              {{- if $jwksUri }}
                              remote_jwks:
                                http_uri:
                                  uri: {{ $jwksUri }}
                                  cluster: {{ if $useProxyForJwks }}jwks_loopback_cluster{{ else }}jwks_service{{ end }}
                                  timeout: 5s
                                cache_duration:
                                  seconds: {{ .Values.authProxy.jwksCacheDurationSeconds | default 300 }}
                              {{- else }}
                              local_jwks:
                                inline_string: '{{ .Values.authProxy.jwksJson }}'
                              {{- end }}
                              from_headers:
                                - name: X-LangSmith-LLM-Auth
                              forward: true
                          rules:
                            - match:
                                prefix: "/"
                              requires:
                                provider_name: langsmith_jwt
                      {{- end }}
                      {{- if .Values.authProxy.extAuthz.enabled }}
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          failure_mode_allow: false
                          allowed_headers:
                            patterns:
                              - safe_regex:
                                  regex: {{ .Values.authProxy.extAuthz.allowedHeadersRegex | quote }}
                          {{- if .Values.authProxy.extAuthz.disallowedHeadersRegex }}
                          disallowed_headers:
                            patterns:
                              - safe_regex:
                                  regex: {{ .Values.authProxy.extAuthz.disallowedHeadersRegex | quote }}
                          {{- end }}
                          http_service:
                            server_uri:
                              uri: {{ .Values.authProxy.extAuthz.serviceUrl }}
                              cluster: ext_authz_service
                              timeout: {{ .Values.authProxy.extAuthz.timeout }}
                            path_prefix: "/check"
                            {{- if .Values.authProxy.extAuthz.headersToAdd }}
                            authorization_request:
                              headers_to_add:
                                {{- range .Values.authProxy.extAuthz.headersToAdd }}
                                - key: {{ .key | quote }}
                                  value: {{ .value | quote }}
                                {{- end }}
                            {{- end }}
                            authorization_response:
                              allowed_upstream_headers:
                                patterns:
                                {{- if .Values.authProxy.extAuthz.allowedUpstreamHeaders }}
                                  {{- range .Values.authProxy.extAuthz.allowedUpstreamHeaders }}
                                  {{- if .exact }}
                                  - exact: {{ .exact | quote }}
                                  {{- else if .prefix }}
                                  - prefix: {{ .prefix | quote }}
                                  {{- else if .safe_regex }}
                                  - safe_regex:
                                      regex: {{ .safe_regex | quote }}
                                  {{- end }}
                                  {{- end }}
                                {{- else }}
                                  # Default to allow "authorization" and headers starting with "x-"
                                  - exact: "authorization"
                                  - prefix: "x-"
                                {{- end }}
                              allowed_client_headers:
                                patterns:
                                  - exact: "www-authenticate"
                                  - prefix: "x-"
                          {{- if .Values.authProxy.extAuthz.sendBody }}
                          with_request_body:
                            max_request_bytes: {{ .Values.authProxy.extAuthz.maxRequestBytes }}
                            allow_partial_message: false
                          {{- end }}
                      {{- end }}
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        {{- if $useProxy }}
        - name: listener_1
          address:
            socket_address:
              address: 127.0.0.1
              port_value: 10001
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: tcp_to_proxy
                    cluster: proxy_cluster
                    tunneling_config:
                      hostname: {{ $upstreamHostname }}:{{ $upstreamPort }}
        {{- end }}
        {{- if $useProxyForJwks }}
        - name: listener_2
          address:
            socket_address:
              address: 127.0.0.1
              port_value: 10002
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: tcp_to_jwks_proxy
                    cluster: proxy_cluster
                    tunneling_config:
                      hostname: {{ $jwksHostname }}:{{ $jwksPort }}
        {{- end }}

      clusters:
        {{- if $useProxy }}
        - name: loopback_cluster
          connect_timeout: 5s
          type: STATIC
          load_assignment:
            cluster_name: loopback_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 10001
          {{- if eq $upstreamScheme "https" }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $upstreamHostname }}
          {{- end }}
        {{- else }}
        - name: upstream_provider
          connect_timeout: 5s
          type: LOGICAL_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: upstream_provider
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ $upstreamHostname }}
                          port_value: {{ $upstreamPort }}
          {{- if eq $upstreamScheme "https" }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $upstreamHostname }}
          {{- end }}
        {{- end }}
        {{- if $needsProxyCluster }}
        - name: proxy_cluster
          connect_timeout: 5s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: proxy_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.authProxy.httpProxy.host }}
                          port_value: {{ .Values.authProxy.httpProxy.port }}
        {{- end }}
        {{- if $useProxyForJwks }}
        - name: jwks_loopback_cluster
          connect_timeout: 5s
          type: STATIC
          load_assignment:
            cluster_name: jwks_loopback_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 10002
          {{- if eq $jwksScheme "https" }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $jwksHostname }}
          {{- end }}
        {{- else if $jwksUri }}
        - name: jwks_service
          connect_timeout: 5s
          type: LOGICAL_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: jwks_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ $jwksHostname }}
                          port_value: {{ $jwksPort }}
          {{- if eq $jwksScheme "https" }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $jwksHostname }}
          {{- end }}
        {{- end }}
        {{- if .Values.authProxy.extAuthz.enabled }}
        - name: ext_authz_service
          connect_timeout: 5s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: ext_authz_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "authProxy.urlHostname" .Values.authProxy.extAuthz.serviceUrl }}
                          port_value: {{ include "authProxy.urlPort" .Values.authProxy.extAuthz.serviceUrl }}
        {{- end }}
{{- end }}
