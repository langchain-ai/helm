suite: upstream path prefix
templates:
  - auth-proxy/config-map.yaml
tests:
  - it: should not include prefix_rewrite when upstream has no path
    set:
      authProxy.upstream: "https://gateway.example.com"
    asserts:
      - notMatchRegex:
          path: data["envoy.yaml"]
          pattern: prefix_rewrite

  - it: should include prefix_rewrite when upstream has a path
    set:
      authProxy.upstream: "https://gateway.example.com/api/v1"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: 'prefix_rewrite: "/api/v1/"'

  - it: should normalize trailing slash in upstream path
    set:
      authProxy.upstream: "https://gateway.example.com/api/v1/"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: 'prefix_rewrite: "/api/v1/"'

  - it: should work with single-segment path
    set:
      authProxy.upstream: "https://gateway.example.com/v1"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: 'prefix_rewrite: "/v1/"'

  - it: should work with multi-segment path
    set:
      authProxy.upstream: "https://gateway.example.com/api/v1/proxy"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: 'prefix_rewrite: "/api/v1/proxy/"'

  - it: should not affect host_rewrite or port when path is present
    set:
      authProxy.upstream: "https://gateway.example.com/api/v1"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: "host_rewrite_literal: gateway.example.com"
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: "port_value: 443"

  - it: should not affect host_rewrite when upstream has trailing slash and path
    set:
      authProxy.upstream: "https://gateway.example.com/api/v1/"
    asserts:
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: "host_rewrite_literal: gateway.example.com"
      - matchRegex:
          path: data["envoy.yaml"]
          pattern: 'prefix_rewrite: "/api/v1/"'
