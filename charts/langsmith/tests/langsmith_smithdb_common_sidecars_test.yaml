suite: test smithdb common sidecars
templates:
  - smithdb/query-deployment.yaml
  - smithdb/cluster-manager-deployment.yaml
  - smithdb/migration-job.yaml
  - smithdb/metastore-migration.yaml
capabilities:
  majorVersion: 1
  minorVersion: 29
tests:
  - it: should omit common sidecars by default
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/query-deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: should prepend common native sidecars to component init containers
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.commonSidecars:
        - name: proxy
          image: example.com/proxy:1.0.0
          args:
            - "--listen=127.0.0.1:5432"
      smithdb.query.deployment.initContainers:
        - name: setup
          image: example.com/setup:1.0.0
    template: smithdb/query-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0]
          value:
            name: proxy
            image: example.com/proxy:1.0.0
            args:
              - "--listen=127.0.0.1:5432"
            restartPolicy: Always
      - equal:
          path: spec.template.spec.initContainers[1]
          value:
            name: setup
            image: example.com/setup:1.0.0

  - it: should add common native sidecars to cluster manager
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.commonSidecars:
        - name: proxy
          image: example.com/proxy:1.0.0
    template: smithdb/cluster-manager-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].restartPolicy
          value: Always

  - it: should add common native sidecars to the metastore migration job
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.commonSidecars:
        - name: proxy
          image: example.com/proxy:1.0.0
    template: smithdb/metastore-migration.yaml
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never
      - equal:
          path: spec.template.spec.initContainers[0]
          value:
            name: proxy
            image: example.com/proxy:1.0.0
            restartPolicy: Always

  - it: should add common native sidecars to the data migration job
    values:
      - ./values/smithdb-enabled.yaml
    set:
      config.blobStorage.enabled: true
      config.blobStorage.bucketName: langsmith-blob
      config.blobStorage.apiURL: http://blob-store:9000
      smithdb.langsmith.migration.enabled: true
      smithdb.migration.taskdb.postgres.enabled: true
      smithdb.migration.taskdb.postgres.auth.password: taskdb-password
      smithdb.commonSidecars:
        - name: proxy
          image: example.com/proxy:1.0.0
    template: smithdb/migration-job.yaml
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never
      - equal:
          path: spec.template.spec.initContainers[0].restartPolicy
          value: Always
