suite: test smithdb integration
templates:
  - backend/deployment.yaml
  - frontend/deployment.yaml
  - config-map.yaml
  - secrets.yaml
  - redis/secrets.yaml
  - postgres/secrets.yaml
  - clickhouse/secrets.yaml
  - frontend/config-map.yaml
  - smithdb/query-deployment.yaml
  - smithdb/ingestion-deployment.yaml
  - smithdb/compaction-deployment.yaml
  - smithdb/compaction-worker-deployment.yaml
  - smithdb/cluster-manager-deployment.yaml
  - smithdb/services.yaml
  - smithdb/pdbs.yaml
  - smithdb/service-account.yaml
  - smithdb/metastore-migration.yaml
tests:
  - it: should render smithdb workloads when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/query-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-query
      - equal:
          path: spec.strategy
          value:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_QUERY__METASTORE__HOST
            valueFrom:
              secretKeyRef:
                name: smithdb-secret
                key: smithdb_metastore_db_host
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_QUERY__CLUSTER_MANAGER__ENDPOINT
            value: http://RELEASE-NAME-langsmith-smithdb-cluster-manager.NAMESPACE.svc.cluster.local:8091
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: INFO,vortex=WARN

  - it: should allow overriding smithdb log level
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.config.observability.logging.level: warn,smithdb_query=debug,vortex=warn
    template: smithdb/query-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: warn,smithdb_query=debug,vortex=warn

  - it: should keep smithdb services internal
    values:
      - ./values/smithdb-enabled.yaml
    set:
      config.skipValidation: true
      smithdb.query.service.type: LoadBalancer
      smithdb.query.service.loadBalancerSourceRanges[0]: "10.0.0.0/8"
      smithdb.query.service.loadBalancerIP: "192.0.2.10"
    template: smithdb/services.yaml
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - notExists:
          path: spec.loadBalancerSourceRanges
      - notExists:
          path: spec.loadBalancerIP

  - it: should wire langsmith app config to smithdb when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: config-map.yaml
    asserts:
      - equal:
          path: data.SMITHDB_QUERY_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-query.NAMESPACE.svc.cluster.local:8080
      - equal:
          path: data.SMITHDB_QUERY_ENABLED
          value: "true"
      - equal:
          path: data.SMITHDB_INGESTION_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-ingestion.NAMESPACE.svc.cluster.local:8082
      - equal:
          path: data.SMITHDB_INGESTION_ENABLED
          value: "true"
      - equal:
          path: data.SMITHDB_MUTATIONS_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-query.NAMESPACE.svc.cluster.local:8080
      - equal:
          path: data.SMITHDB_INGEST_ORGS_ROLLOUT_PCT
          value: "100"

  - it: should wire frontend SmithDB v2 endpoint flag when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: frontend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_SELF_HOSTED_SMITHDB_V2_ENDPOINTS_ENABLED
            value: "true"

  - it: should skip all smithdb resources when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    templates:
      - smithdb/query-deployment.yaml
      - smithdb/ingestion-deployment.yaml
      - smithdb/compaction-deployment.yaml
      - smithdb/compaction-worker-deployment.yaml
      - smithdb/cluster-manager-deployment.yaml
      - smithdb/services.yaml
      - smithdb/pdbs.yaml
      - smithdb/service-account.yaml
      - smithdb/metastore-migration.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should omit LangSmith SmithDB config when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    template: config-map.yaml
    asserts:
      - notExists:
          path: data.SMITHDB_QUERY_SERVICE_URL
      - notExists:
          path: data.SMITHDB_QUERY_ENABLED
      - notExists:
          path: data.SMITHDB_MUTATIONS_SERVICE_URL
      - notExists:
          path: data.SMITHDB_INGESTION_SERVICE_URL
      - notExists:
          path: data.SMITHDB_INGESTION_ENABLED
      - notExists:
          path: data.SMITHDB_INGEST_ORGS_ROLLOUT_PCT
      - notExists:
          path: data.SMITHDB_CLUSTER_MANAGER_ENABLED
      - notExists:
          path: data.SMITHDB_CLUSTER_MANAGER_URL

  - it: should omit frontend SmithDB v2 endpoint flag when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    template: frontend/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_SELF_HOSTED_SMITHDB_V2_ENDPOINTS_ENABLED

  - it: should render zero-downtime rollout strategy for smithdb ingestion
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.strategy
          value:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0

  - it: should disable smithdb cluster-manager tracing by default
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/cluster-manager-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_CLUSTERMANAGER__LOGGING__TRACING_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_CLUSTERMANAGER__LOGGING__FORMAT
            value: console

  - it: should expose compaction worker concurrency as a value
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.compactionWorker.maxConcurrentJobs: 8
    template: smithdb/compaction-worker-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_COMPACTION_WORKER__MAX_CONCURRENT_JOBS
            value: "8"
