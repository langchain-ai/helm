suite: test smithdb integration
templates:
  - backend/deployment.yaml
  - frontend/deployment.yaml
  - config-map.yaml
  - secrets.yaml
  - redis/secrets.yaml
  - postgres/secrets.yaml
  - clickhouse/secrets.yaml
  - frontend/config-map.yaml
  - smithdb/query-deployment.yaml
  - smithdb/ingestion-deployment.yaml
  - smithdb/compaction-deployment.yaml
  - smithdb/compaction-worker-deployment.yaml
  - smithdb/cluster-manager-deployment.yaml
  - smithdb/migration-deployment.yaml
  - smithdb/taskdb-postgres-secret.yaml
  - smithdb/taskdb-postgres-service.yaml
  - smithdb/taskdb-postgres-statefulset.yaml
  - smithdb/services.yaml
  - smithdb/pdbs.yaml
  - smithdb/service-account.yaml
  - smithdb/metastore-migration.yaml
tests:
  - it: should render smithdb workloads when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/query-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-query
      - equal:
          path: spec.strategy
          value:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_QUERY__METASTORE__HOST
            valueFrom:
              secretKeyRef:
                name: smithdb-secret
                key: smithdb_metastore_db_host
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_QUERY__CLUSTER_MANAGER__ENDPOINT
            value: http://RELEASE-NAME-langsmith-smithdb-cluster-manager.NAMESPACE.svc.cluster.local:8091
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: INFO,vortex=WARN

  - it: should allow overriding smithdb log level
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.config.observability.logging.level: warn,smithdb_query=debug,vortex=warn
    template: smithdb/query-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: warn,smithdb_query=debug,vortex=warn

  - it: should keep smithdb services internal
    values:
      - ./values/smithdb-enabled.yaml
    set:
      config.skipValidation: true
      smithdb.query.service.type: LoadBalancer
      smithdb.query.service.loadBalancerSourceRanges[0]: "10.0.0.0/8"
      smithdb.query.service.loadBalancerIP: "192.0.2.10"
    template: smithdb/services.yaml
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - notExists:
          path: spec.loadBalancerSourceRanges
      - notExists:
          path: spec.loadBalancerIP

  - it: should wire langsmith app config to smithdb when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: config-map.yaml
    asserts:
      - equal:
          path: data.SMITHDB_QUERY_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-query.NAMESPACE.svc.cluster.local:8080
      - equal:
          path: data.SMITHDB_QUERY_ENABLED
          value: "true"
      - equal:
          path: data.SMITHDB_INGESTION_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-ingestion.NAMESPACE.svc.cluster.local:8082
      - equal:
          path: data.SMITHDB_INGESTION_ENABLED
          value: "true"
      - equal:
          path: data.SMITHDB_MUTATIONS_SERVICE_URL
          value: RELEASE-NAME-langsmith-smithdb-query.NAMESPACE.svc.cluster.local:8080
      - equal:
          path: data.SMITHDB_INGEST_ORGS_ROLLOUT_PCT
          value: "100"

  - it: should wire frontend SmithDB v2 endpoint flag when enabled
    values:
      - ./values/smithdb-enabled.yaml
    template: frontend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_SELF_HOSTED_SMITHDB_V2_ENDPOINTS_ENABLED
            value: "true"

  - it: should skip all smithdb resources when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    templates:
      - smithdb/query-deployment.yaml
      - smithdb/ingestion-deployment.yaml
      - smithdb/compaction-deployment.yaml
      - smithdb/compaction-worker-deployment.yaml
      - smithdb/cluster-manager-deployment.yaml
      - smithdb/migration-deployment.yaml
      - smithdb/taskdb-postgres-secret.yaml
      - smithdb/taskdb-postgres-service.yaml
      - smithdb/taskdb-postgres-statefulset.yaml
      - smithdb/services.yaml
      - smithdb/pdbs.yaml
      - smithdb/service-account.yaml
      - smithdb/metastore-migration.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should omit LangSmith SmithDB config when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    template: config-map.yaml
    asserts:
      - notExists:
          path: data.SMITHDB_QUERY_SERVICE_URL
      - notExists:
          path: data.SMITHDB_QUERY_ENABLED
      - notExists:
          path: data.SMITHDB_MUTATIONS_SERVICE_URL
      - notExists:
          path: data.SMITHDB_INGESTION_SERVICE_URL
      - notExists:
          path: data.SMITHDB_INGESTION_ENABLED
      - notExists:
          path: data.SMITHDB_INGEST_ORGS_ROLLOUT_PCT
      - notExists:
          path: data.SMITHDB_CLUSTER_MANAGER_ENABLED
      - notExists:
          path: data.SMITHDB_CLUSTER_MANAGER_URL

  - it: should omit frontend SmithDB v2 endpoint flag when disabled
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.enabled: false
    template: frontend/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_SELF_HOSTED_SMITHDB_V2_ENDPOINTS_ENABLED

  - it: should render zero-downtime rollout strategy for smithdb ingestion
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.strategy
          value:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0

  - it: should disable smithdb cluster-manager tracing by default
    values:
      - ./values/smithdb-enabled.yaml
    template: smithdb/cluster-manager-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_CLUSTERMANAGER__LOGGING__TRACING_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_CLUSTERMANAGER__LOGGING__FORMAT
            value: console

  - it: should expose compaction worker concurrency as a value
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.compactionWorker.maxConcurrentJobs: 8
    template: smithdb/compaction-worker-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_COMPACTION_WORKER__MAX_CONCURRENT_JOBS
            value: "8"

  - it: should omit smithdb migration resources by default
    values:
      - ./values/smithdb-enabled.yaml
    templates:
      - smithdb/migration-deployment.yaml
      - smithdb/taskdb-postgres-secret.yaml
      - smithdb/taskdb-postgres-service.yaml
      - smithdb/taskdb-postgres-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render smithdb migration resources with chart-managed taskdb
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.migration.enabled: true
      smithdb.langsmith.frontend.useSmithDBEndpoints: false
      smithdb.migration.taskdb.postgres.enabled: true
      smithdb.migration.taskdb.postgres.auth.password: taskdb-password
    templates:
      - smithdb/migration-deployment.yaml
      - smithdb/taskdb-postgres-secret.yaml
      - smithdb/taskdb-postgres-service.yaml
      - smithdb/taskdb-postgres-statefulset.yaml
    asserts:
      - template: smithdb/migration-deployment.yaml
        isKind:
          of: Deployment
      - template: smithdb/migration-deployment.yaml
        equal:
          path: spec.replicas
          value: 1
      - template: smithdb/migration-deployment.yaml
        equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/langchain/smithdb:latest
      - template: smithdb/migration-deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_MIGRATION__TASKDB__PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
                key: postgres_password
      - template: smithdb/taskdb-postgres-secret.yaml
        isKind:
          of: Secret
      - template: smithdb/taskdb-postgres-secret.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
      - template: smithdb/taskdb-postgres-secret.yaml
        equal:
          path: data.postgres_password
          value: dGFza2RiLXBhc3N3b3Jk
      - template: smithdb/taskdb-postgres-service.yaml
        isKind:
          of: Service
      - template: smithdb/taskdb-postgres-service.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
      - template: smithdb/taskdb-postgres-statefulset.yaml
        isKind:
          of: StatefulSet
      - template: smithdb/taskdb-postgres-statefulset.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
      - template: smithdb/taskdb-postgres-statefulset.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
                key: postgres_password

  - it: should allow tuning smithdb migration replicas
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.migration.enabled: true
      smithdb.langsmith.frontend.useSmithDBEndpoints: false
      smithdb.migration.deployment.replicas: 2
      smithdb.migration.taskdb.postgres.enabled: true
      smithdb.migration.taskdb.postgres.auth.password: taskdb-password
    template: smithdb/migration-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should omit smithdb migration during lsm backfill
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.frontend.useSmithDBEndpoints: false
      smithdb.langsmith.lsmBackfill.enabled: true
    template: smithdb/migration-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should enable sequenced lsm backfill on compaction only
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.frontend.useSmithDBEndpoints: false
      smithdb.langsmith.lsmBackfill.enabled: true
    template: smithdb/compaction-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_COMPACTION__SEQUENCED_LSM_BACKFILL_ENABLED
            value: "true"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_COMPACTION__SKIP_RUNS_COMPACTION_ON_THREAD_TRACE_FLUSH

  - it: should use an existing smithdb taskdb postgres secret when provided
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.migration.enabled: true
      smithdb.migration.taskdb.postgres.enabled: true
      smithdb.migration.taskdb.postgres.auth.existingSecretName: smithdb-taskdb-secret
    templates:
      - smithdb/taskdb-postgres-secret.yaml
      - smithdb/taskdb-postgres-statefulset.yaml
    asserts:
      - template: smithdb/taskdb-postgres-secret.yaml
        hasDocuments:
          count: 0
      - template: smithdb/taskdb-postgres-statefulset.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: smithdb-taskdb-secret
                key: postgres_password

  - it: should render smithdb migration with external taskdb postgres
    values:
      - ./values/smithdb-enabled.yaml
    set:
      smithdb.langsmith.migration.enabled: true
      smithdb.langsmith.frontend.useSmithDBEndpoints: false
      smithdb.migration.taskdb.postgres.enabled: true
      smithdb.migration.taskdb.postgres.external.enabled: true
      smithdb.migration.taskdb.postgres.external.host: external-taskdb
      smithdb.migration.taskdb.postgres.external.port: "5433"
      smithdb.migration.taskdb.postgres.external.database: external_taskdb
      smithdb.migration.taskdb.postgres.external.username: external_user
      smithdb.migration.taskdb.postgres.external.password: external-password
      smithdb.migration.taskdb.postgres.external.useSsl: true
    templates:
      - smithdb/migration-deployment.yaml
      - smithdb/taskdb-postgres-secret.yaml
      - smithdb/taskdb-postgres-service.yaml
      - smithdb/taskdb-postgres-statefulset.yaml
    asserts:
      - template: smithdb/taskdb-postgres-service.yaml
        hasDocuments:
          count: 0
      - template: smithdb/taskdb-postgres-statefulset.yaml
        hasDocuments:
          count: 0
      - template: smithdb/taskdb-postgres-secret.yaml
        isKind:
          of: Secret
      - template: smithdb/taskdb-postgres-secret.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
      - template: smithdb/taskdb-postgres-secret.yaml
        exists:
          path: data.postgres_host
      - template: smithdb/migration-deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_MIGRATION__TASKDB__HOST
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
                key: postgres_host
      - template: smithdb/migration-deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_MIGRATION__TASKDB__PORT
            value: "5433"
      - template: smithdb/migration-deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_MIGRATION__TASKDB__PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-smithdb-taskdb-postgres
                key: postgres_password
      - template: smithdb/migration-deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHDB_MIGRATION__TASKDB__USE_SSL
            value: "true"

