suite: fleet server values validation
templates:
  - validate.yaml
tests:
  - it: should fail when deprecated agentBuilderToolServer values are set
    set:
      config.existingSecretName: "langsmith-secrets"
      config.oauth.enabled: true
      config.authType: "oauth"
      agentBuilderToolServer.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "agentBuilderToolServer is deprecated. Please use fleetToolServer."

  - it: should fail when deprecated agentBuilderTriggerServer values are set
    set:
      config.existingSecretName: "langsmith-secrets"
      config.oauth.enabled: true
      config.authType: "oauth"
      agentBuilderTriggerServer.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "agentBuilderTriggerServer is deprecated. Please use fleetTriggerServer."

  - it: should fail when deprecated agentBuilderToolServerImage values are set
    set:
      config.existingSecretName: "langsmith-secrets"
      config.oauth.enabled: true
      config.authType: "oauth"
      images.agentBuilderToolServerImage.tag: "test"
    asserts:
      - failedTemplate:
          errorMessage: "images.agentBuilderToolServerImage is deprecated. Please use images.fleetToolServerImage."

  - it: should fail when deprecated agentBuilderTriggerServerImage values are set
    set:
      config.existingSecretName: "langsmith-secrets"
      config.oauth.enabled: true
      config.authType: "oauth"
      images.agentBuilderTriggerServerImage.tag: "test"
    asserts:
      - failedTemplate:
          errorMessage: "images.agentBuilderTriggerServerImage is deprecated. Please use images.fleetTriggerServerImage."
