suite: self-hosted sandboxes
templates:
  - validate.yaml
  - config-map.yaml
  - secrets.yaml
  - redis/secrets.yaml
  - postgres/secrets.yaml
  - clickhouse/secrets.yaml
  - frontend/config-map.yaml
  - frontend/deployment.yaml
  - platform-backend/deployment.yaml
  - ingest-queue/deployment.yaml
  - sandboxes/proxy-ca.yaml
  - sandboxes/juicefs-csi.yaml
  - sandboxes/smithbox-control.yaml
  - sandboxes/sandbox-host-rbac.yaml
  - sandboxes/sandbox-host-service.yaml
  - sandboxes/sandbox-host-statefulset.yaml
  - sandboxes/sandbox-host-installer-daemonset.yaml
tests:
  - it: should not render sandbox runtime resources by default
    set:
      config.existingSecretName: langsmith-secrets
      config.oauth.enabled: true
      config.authType: oauth
    templates:
      - sandboxes/proxy-ca.yaml
      - sandboxes/juicefs-csi.yaml
      - sandboxes/smithbox-control.yaml
      - sandboxes/sandbox-host-rbac.yaml
      - sandboxes/sandbox-host-service.yaml
      - sandboxes/sandbox-host-statefulset.yaml
      - sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should wire platform backend sandbox environment when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: platform-backend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FEATURE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FRONTEND_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_RUNTIME_V2
            value: always
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGSMITH_LICENSE_REQUIRED_CLAIMS
            value: sandbox_enabled
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_CONTROL_URL
            value: http://smithbox-control.NAMESPACE.svc.cluster.local:9090
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_K8S_CLUSTER_NAME
            value: self-hosted-test
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret
                optional: false

  - it: should wire optional sandbox keys from an existing LangSmith secret into platform backend
    values:
      - ./values/sandboxes-enabled.yaml
    template: platform-backend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET_PREVIOUS
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret_previous
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGSMITH_SANDBOX_CALLBACK_SIGNING_JWK
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_callback_signing_jwk
                optional: true

  - it: should set VITE_HOST_ENABLED when sandboxes are enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: frontend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_HOST_ENABLED
            value: "1"

  - it: should route sandbox v2 API traffic through the chart frontend
    values:
      - ./values/sandboxes-enabled.yaml
    template: frontend/config-map.yaml
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location /api/v2/sandboxes/'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite /api/v2/sandboxes/\(\.\*\) /v2/sandboxes/\$1'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'proxy_set_header Upgrade \$http_upgrade;'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'proxy_set_header Connection \$connection_upgrade;'

  - it: should route sandbox v2 API traffic through the chart frontend with basePath
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.basePath: langsmith
    template: frontend/config-map.yaml
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location /langsmith/api/v2/sandboxes/'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite /langsmith/api/v2/sandboxes/\(\.\*\) /v2/sandboxes/\$1'

  - it: should route runs analytics v2 traffic through the chart frontend
    values:
      - ./values/sandboxes-enabled.yaml
    template: frontend/config-map.yaml
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location /api/v2/runs/analytics'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite /api/v2/runs/analytics\(\.\*\) /v2/runs/analytics\$1'

  - it: should route runs analytics v2 traffic through the chart frontend with basePath
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.basePath: langsmith
    template: frontend/config-map.yaml
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location /langsmith/api/v2/runs/analytics'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite /langsmith/api/v2/runs/analytics\(\.\*\) /v2/runs/analytics\$1'

  - it: should derive a relative platform endpoint for sandbox dataplane URLs
    values:
      - ./values/sandboxes-enabled.yaml
    template: config-map.yaml
    asserts:
      - equal:
          path: data.LANGCHAIN_PLATFORM_ENDPOINT
          value: /api

  - it: should derive a basePath-aware relative platform endpoint for sandbox dataplane URLs
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.basePath: langsmith
    template: config-map.yaml
    asserts:
      - equal:
          path: data.LANGCHAIN_PLATFORM_ENDPOINT
          value: /langsmith/api

  - it: should derive an absolute platform endpoint for sandbox dataplane URLs when hostname is set
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.hostname: langsmith.example.com
    template: config-map.yaml
    asserts:
      - equal:
          path: data.LANGCHAIN_PLATFORM_ENDPOINT
          value: https://langsmith.example.com/api

  - it: should allow sandboxes when the chart frontend is disabled
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      frontend.enabled: false
    template: validate.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should store sandbox auth material in the chart-managed LangSmith secret
    set:
      config.langsmithLicenseKey: test-license
      config.apiKeySalt: test-api-key-salt
      config.oauth.enabled: true
      config.authType: oauth
      config.sandboxes.enabled: true
      config.sandboxes.clusterName: self-hosted-test
      config.sandboxes.xServiceAuthJwtSecret: test-sandbox-jwt
      config.sandboxes.juicefs.redis.metaURL: redis://langsmith-redis.default.svc.cluster.local:6379/1
      config.sandboxes.juicefs.bucket: https://langsmith-sandboxes-test.s3.us-west-2.amazonaws.com
      images.sandboxHostImage.repository: example.com/langsmith/sandbox-host
      images.sandboxHostImage.tag: test-sandbox-host
      images.smithboxControlImage.repository: example.com/langsmith/smithbox-control
      images.smithboxControlImage.tag: test-smithbox-control
      insights.encryptionKey: test-insights-encryption-key
      polly.encryptionKey: test-polly-encryption-key
    template: secrets.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-secrets
      - equal:
          path: data.sandbox_x_service_auth_jwt_secret
          value: dGVzdC1zYW5kYm94LWp3dA==

  - it: should use configured LANGCHAIN_ENV in the shared config map
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.langchainEnv: chart-env
    template: config-map.yaml
    asserts:
      - equal:
          path: data.LANGCHAIN_ENV
          value: chart-env

  - it: should wire ingest queue sandbox environment when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: ingest-queue/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FEATURE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_CONTROL_URL
            value: http://smithbox-control.NAMESPACE.svc.cluster.local:9090
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_DEFAULT_BLUEPRINT_IMAGE
            value: python:3.12
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_QUEUE_PRIORITY
            value: "1"

  - it: should render smithbox-control when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: metadata.name
          value: smithbox-control
      - equal:
          path: metadata.namespace
          value: NAMESPACE
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/langsmith/smithbox-control:test-smithbox-control
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: X_SERVICE_AUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret
                optional: false
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: X_SERVICE_AUTH_JWT_SECRET_PREVIOUS
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret_previous
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-redis
                key: connection_url
                optional: false

  - it: should let smithbox-control use a user-managed Redis Secret in the release namespace
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.existingSecretName: langsmith-redis
      redis.external.connectionUrlSecretKey: sandbox_connection_url
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: langsmith-redis
                key: sandbox_connection_url
                optional: false

  - it: should derive smithbox-control Redis IAM auth provider from root Redis config
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.iamAuthProvider: aws
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_IAM_AUTH_PROVIDER
            value: aws

  - it: should derive smithbox-control Redis cluster mode from root Redis config
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.cluster.enabled: true
      redis.external.cluster.nodeUris:
        - redis://redis-0:6379
        - redis://redis-1:6379
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            value: redis://redis-0:6379
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_CLUSTER_ADDRS
            value: redis://redis-0:6379,redis://redis-1:6379
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_CLUSTER_ENABLED
            value: "true"

  - it: should reference the chart Redis Secret name when Redis secret creation is disabled
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.disableSecretCreation: true
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-redis
                key: connection_url
                optional: true

  - it: should use configured LANGCHAIN_ENV for smithbox-control
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.langchainEnv: chart-env
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: chart-env

  - it: should use configured LANGCHAIN_ENV for sandbox-host
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.langchainEnv: chart-env
    template: sandboxes/sandbox-host-statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: chart-env

  - it: should use configured LANGCHAIN_ENV for sandbox-host installer
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.langchainEnv: chart-env
    template: sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: chart-env

  - it: should render sandbox-host with host network and OnDelete rollout
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/sandbox-host-statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: sandbox-host
      - equal:
          path: metadata.namespace
          value: NAMESPACE
      - equal:
          path: spec.serviceName
          value: sandbox-host
      - equal:
          path: spec.podManagementPolicy
          value: Parallel
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].labelSelector.matchLabels.app
          value: sandbox-host
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.containers[0].ports[0].hostPort
          value: 19190
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.langsmith.com/host: "true"
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.langsmith.com/host
              operator: Equal
              value: "true"
              effect: NoSchedule
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: proxy-ca
            mountPath: /certs
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret
                optional: false
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGSMITH_SANDBOX_CALLBACK_SIGNING_JWK
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_callback_signing_jwk
                optional: true

  - it: should render the sandbox-host headless service
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/sandbox-host-service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: sandbox-host
      - equal:
          path: metadata.namespace
          value: NAMESPACE
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.selector
          value:
            app: sandbox-host
      - equal:
          path: spec.ports[0].port
          value: 19190

  - it: should wire sandbox-host installer to the main LangSmith secret
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret
                optional: false

  - it: should render custom sandbox-host scheduling on sandbox-host
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-custom-scheduling.yaml
    template: sandboxes/sandbox-host-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.example.com/pool: hosts
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.example.com/pool
              operator: Equal
              value: hosts
              effect: NoSchedule

  - it: should render custom sandbox-host scheduling on sandbox-host installer
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-custom-scheduling.yaml
    template: sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.example.com/pool: hosts
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.example.com/pool
              operator: Equal
              value: hosts
              effect: NoSchedule

  - it: should render JuiceFS CSI config and host PVC when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/juicefs-csi.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.name
          value: sandbox-juicefs
      - equal:
          path: stringData.metaurl
          value: redis://langsmith-redis.default.svc.cluster.local:6379/1

  - it: should render JuiceFS CSI host PV when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/juicefs-csi.yaml
    documentIndex: 3
    asserts:
      - isKind:
          of: PersistentVolume
      - equal:
          path: metadata.name
          value: smithbox-juicefs-csi-host
      - equal:
          path: spec.csi.volumeHandle
          value: smithbox-juicefs-csi-host
      - equal:
          path: spec.csi.driver
          value: csi.juicefs.com
      - equal:
          path: spec.csi.nodePublishSecretRef.name
          value: juicefs-csi-config
      - equal:
          path: spec.csi.nodePublishSecretRef.namespace
          value: NAMESPACE

  - it: should allow an externally managed JuiceFS CSI config Secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.redis.metaURL: ""
      config.sandboxes.juicefs.bucket: ""
      config.sandboxes.juicefs.csi.existingSecretName: external-juicefs-csi-config
    template: sandboxes/juicefs-csi.yaml
    documentIndex: 2
    asserts:
      - isKind:
          of: PersistentVolume
      - equal:
          path: metadata.name
          value: smithbox-juicefs-csi-host
      - equal:
          path: spec.csi.nodePublishSecretRef.name
          value: external-juicefs-csi-config
      - equal:
          path: spec.csi.nodePublishSecretRef.namespace
          value: NAMESPACE

  - it: should not require JuiceFS config values when using an externally managed CSI config Secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.redis.metaURL: ""
      config.sandboxes.juicefs.bucket: ""
      config.sandboxes.juicefs.csi.existingSecretName: external-juicefs-csi-config
    template: validate.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should mount the derived JuiceFS host PVC on sandbox-host
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/sandbox-host-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: smithbox-juicefs-csi-host

  - it: should fail when sandboxes are enabled without image tags
    set:
      config.existingSecretName: langsmith-secrets
      config.oauth.enabled: true
      config.authType: oauth
      config.sandboxes.enabled: true
      config.sandboxes.juicefs.redis.metaURL: redis://langsmith-redis.default.svc.cluster.local:6379/1
      config.sandboxes.juicefs.bucket: s3://langsmith-sandboxes-test
      images.sandboxHostImage.repository: example.com/langsmith/sandbox-host
      images.smithboxControlImage.repository: example.com/langsmith/smithbox-control
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "images.sandboxHostImage.tag is required when config.sandboxes.enabled is true."

  - it: should fail when JuiceFS name is invalid
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.name: Sandbox_JuiceFS
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.juicefs.name must be a DNS-label-style JuiceFS volume name: 3-63 characters, lowercase letters, numbers, and hyphens only. Do not use slashes or object-store subpaths here."

  - it: should fail when JuiceFS name contains a slash
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.name: sandbox/juicefs
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.juicefs.name must be a DNS-label-style JuiceFS volume name: 3-63 characters, lowercase letters, numbers, and hyphens only. Do not use slashes or object-store subpaths here."

  - it: should fail when AWS JuiceFS bucket uses s3 shorthand
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.storage: s3
      config.sandboxes.juicefs.bucket: s3://langsmith-sandboxes-test
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.juicefs.bucket must use a region-explicit S3 endpoint URL such as https://bucket-name.s3.us-west-2.amazonaws.com when config.sandboxes.juicefs.storage is s3. The s3://bucket shorthand makes JuiceFS infer region with GetBucketLocation and is not supported."

  - it: should fail when existing app Secret is used with chart-provided sandbox service auth secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.xServiceAuthJwtSecret: test-sandbox-jwt
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.xServiceAuthJwtSecret cannot be used when config.existingSecretName is set. Add key sandbox_x_service_auth_jwt_secret to the existing Secret instead."

  - it: should fail when existing app Secret is used with chart-provided previous sandbox service auth secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.xServiceAuthJwtSecretPrevious: test-previous-sandbox-jwt
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.xServiceAuthJwtSecretPrevious cannot be used when config.existingSecretName is set. Add key sandbox_x_service_auth_jwt_secret_previous to the existing Secret instead."

  - it: should fail when existing app Secret is used with chart-provided sandbox callback signing JWK
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.callbackSigningJwk: test-callback-jwk
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.callbackSigningJwk cannot be used when config.existingSecretName is set. Add key sandbox_callback_signing_jwk to the existing Secret instead."

  - it: should fail when raw sandbox env vars conflict with chart-managed platform env
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-conflicting-env.yaml
    template: platform-backend/deployment.yaml
    asserts:
      - failedTemplate:
          errorMessage: "Duplicate keys detected: [SMITHBOX_CONTROL_URL]"

  - it: should fail when Redis Cluster is configured only through an existing secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.existingSecretName: redis-cluster
      redis.external.cluster.enabled: true
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.enabled with redis.external.cluster.enabled currently requires redis.external.cluster.nodeUris to be set directly instead of redis.external.existingSecretName."
