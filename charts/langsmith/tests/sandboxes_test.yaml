suite: self-hosted sandboxes
templates:
  - validate.yaml
  - config-map.yaml
  - secrets.yaml
  - redis/secrets.yaml
  - postgres/secrets.yaml
  - clickhouse/secrets.yaml
  - frontend/config-map.yaml
  - platform-backend/deployment.yaml
  - ingest-queue/deployment.yaml
  - sandboxes/namespace.yaml
  - sandboxes/redis-secret.yaml
  - sandboxes/secrets.yaml
  - sandboxes/proxy-ca.yaml
  - sandboxes/juicefs-csi.yaml
  - sandboxes/smithbox-control.yaml
  - sandboxes/sandbox-host-rbac.yaml
  - sandboxes/sandbox-host-daemonset.yaml
  - sandboxes/sandbox-host-installer-daemonset.yaml
tests:
  - it: should not render sandbox runtime resources by default
    set:
      config.existingSecretName: langsmith-secrets
      config.oauth.enabled: true
      config.authType: oauth
    templates:
      - sandboxes/namespace.yaml
      - sandboxes/redis-secret.yaml
      - sandboxes/secrets.yaml
      - sandboxes/proxy-ca.yaml
      - sandboxes/juicefs-csi.yaml
      - sandboxes/smithbox-control.yaml
      - sandboxes/sandbox-host-rbac.yaml
      - sandboxes/sandbox-host-daemonset.yaml
      - sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should wire platform backend sandbox environment when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: platform-backend/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FEATURE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FRONTEND_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_RUNTIME_V2
            value: always
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGSMITH_LICENSE_REQUIRED_CLAIMS
            value: sandbox_enabled
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_ORG_FEATURE_SANDBOX_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_CONTROL_URL
            value: http://smithbox-control.langsmith-sandboxes.svc.cluster.local:9090
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_K8S_CLUSTER_NAME
            value: self-hosted-test
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: langsmith-secrets
                key: sandbox_x_service_auth_jwt_secret
                optional: false

  - it: should wire ingest queue sandbox environment when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: ingest-queue/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_FEATURE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_CONTROL_URL
            value: http://smithbox-control.langsmith-sandboxes.svc.cluster.local:9090
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_DEFAULT_BLUEPRINT_IMAGE
            value: python:3.12
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SANDBOX_QUEUE_PRIORITY
            value: "1"

  - it: should render smithbox-control when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: metadata.name
          value: smithbox-control
      - equal:
          path: metadata.namespace
          value: langsmith-sandboxes
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/langsmith/smithbox-control:test-smithbox-control
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-redis
                key: connection_url
                optional: false

  - it: should render sandbox Redis Secret in the sandbox namespace for chart-managed Redis
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/redis-secret.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-langsmith-redis
      - equal:
          path: metadata.namespace
          value: langsmith-sandboxes
      - equal:
          path: stringData.connection_url
          value: redis://RELEASE-NAME-langsmith-redis.NAMESPACE.svc.cluster.local:6379

  - it: should let smithbox-control use a user-managed Redis Secret in the sandbox namespace
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.existingSecretName: langsmith-redis
      redis.external.connectionUrlSecretKey: sandbox_connection_url
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: langsmith-redis
                key: sandbox_connection_url
                optional: false

  - it: should not render sandbox Redis Secret when Redis uses an existing Secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.existingSecretName: langsmith-redis
    template: sandboxes/redis-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference the chart Redis Secret name when Redis secret creation is disabled
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.disableSecretCreation: true
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMITHBOX_REDIS_ADDR
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-langsmith-redis
                key: connection_url
                optional: true

  - it: should not render sandbox Redis Secret when Redis secret creation is disabled
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.disableSecretCreation: true
    template: sandboxes/redis-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should use configured LANGCHAIN_ENV for smithbox-control
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.langchainEnv: sandbox-specific-env
    template: sandboxes/smithbox-control.yaml
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: sandbox-specific-env

  - it: should use configured LANGCHAIN_ENV for sandbox-host
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.langchainEnv: sandbox-specific-env
    template: sandboxes/sandbox-host-daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: sandbox-specific-env

  - it: should use configured LANGCHAIN_ENV for sandbox-host installer
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.langchainEnv: sandbox-specific-env
    template: sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGCHAIN_ENV
            value: sandbox-specific-env

  - it: should render sandbox-host with host network and OnDelete rollout
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/sandbox-host-daemonset.yaml
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: sandbox-host
      - equal:
          path: metadata.namespace
          value: langsmith-sandboxes
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.containers[0].ports[0].hostPort
          value: 19190
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.langsmith.com/host: "true"
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.langsmith.com/host
              operator: Equal
              value: "true"
              effect: NoSchedule
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: proxy-ca
            mountPath: /certs
            readOnly: true

  - it: should render custom sandbox-host scheduling on sandbox-host
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-custom-scheduling.yaml
    template: sandboxes/sandbox-host-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.example.com/pool: hosts
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.example.com/pool
              operator: Equal
              value: hosts
              effect: NoSchedule

  - it: should render custom sandbox-host scheduling on sandbox-host installer
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-custom-scheduling.yaml
    template: sandboxes/sandbox-host-installer-daemonset.yaml
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            sandbox.example.com/pool: hosts
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: sandbox.example.com/pool
              operator: Equal
              value: hosts
              effect: NoSchedule

  - it: should render JuiceFS CSI config and host PVC when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/juicefs-csi.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.name
          value: sandbox-juicefs

  - it: should render JuiceFS CSI host PV when enabled
    values:
      - ./values/sandboxes-enabled.yaml
    template: sandboxes/juicefs-csi.yaml
    documentIndex: 3
    asserts:
      - isKind:
          of: PersistentVolume
      - equal:
          path: spec.csi.driver
          value: csi.juicefs.com
      - equal:
          path: spec.csi.nodePublishSecretRef.name
          value: juicefs-csi-config
      - equal:
          path: spec.csi.nodePublishSecretRef.namespace
          value: NAMESPACE

  - it: should fail when sandboxes are enabled without image tags
    set:
      config.existingSecretName: langsmith-secrets
      config.oauth.enabled: true
      config.authType: oauth
      config.sandboxes.enabled: true
      config.sandboxes.xServiceAuthJwtSecret: test-sandbox-jwt
      config.sandboxes.juicefs.enabled: true
      config.sandboxes.juicefs.csi.enabled: true
      config.sandboxes.juicefs.csi.metaURL: redis://langsmith-redis.default.svc.cluster.local:6379/1
      config.sandboxes.juicefs.bucket: s3://langsmith-sandboxes-test
      images.sandboxHostImage.repository: example.com/langsmith/sandbox-host
      images.smithboxControlImage.repository: example.com/langsmith/smithbox-control
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "images.sandboxHostImage.tag is required when config.sandboxes.enabled is true."

  - it: should fail when JuiceFS name is invalid
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.name: Sandbox_JuiceFS
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.juicefs.name must be a DNS-label-style JuiceFS volume name: 3-63 characters, lowercase letters, numbers, and hyphens only. Do not use slashes or object-store subpaths here."

  - it: should fail when JuiceFS name contains a slash
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      config.sandboxes.juicefs.name: sandbox/juicefs
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.juicefs.name must be a DNS-label-style JuiceFS volume name: 3-63 characters, lowercase letters, numbers, and hyphens only. Do not use slashes or object-store subpaths here."

  - it: should fail when raw sandbox env vars conflict with chart-managed platform env
    values:
      - ./values/sandboxes-enabled.yaml
      - ./values/sandboxes-conflicting-env.yaml
    template: platform-backend/deployment.yaml
    asserts:
      - failedTemplate:
          errorMessage: "Duplicate keys detected: [SMITHBOX_CONTROL_URL]"

  - it: should fail when Redis Cluster is configured only through an existing secret
    values:
      - ./values/sandboxes-enabled.yaml
    set:
      redis.external.enabled: true
      redis.external.existingSecretName: redis-cluster
      redis.external.cluster.enabled: true
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorMessage: "config.sandboxes.enabled with redis.external.cluster.enabled currently requires redis.external.cluster.nodeUris to be set directly instead of redis.external.existingSecretName."
