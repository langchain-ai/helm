suite: test frontend nginx oauth-callback routing
templates:
  - frontend/config-map.yaml
tests:
  - it: routes /oauth-callback POSTs to the backend and GETs to the SPA (no basePath)
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location = /oauth-callback \{'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'if \(\$request_method = POST\) \{\s+rewrite \^ /api/v1/oauth/custom-oidc/callback last;'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite \^ /index\.html last;'

  - it: routes /<basePath>/oauth-callback POSTs to the backend and GETs to the SPA (with basePath)
    set:
      config.basePath: "langsmith"
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'location = /langsmith/oauth-callback \{'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'if \(\$request_method = POST\) \{\s+rewrite \^ /langsmith/api/v1/oauth/custom-oidc/callback last;'
      - matchRegex:
          path: data["nginx.conf"]
          pattern: 'rewrite \^ /langsmith/index\.html last;'
