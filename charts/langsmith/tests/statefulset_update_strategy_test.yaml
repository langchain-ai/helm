  - it: fleet redis renders a configured updateStrategy
    template: agent-features/fleet/redis/statefulset.yaml
    set:
      fleet.enabled: true
      fleet.redis.statefulSet.updateStrategy.type: OnDelete
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: OnDelete

  # --- fleet postgres ---
