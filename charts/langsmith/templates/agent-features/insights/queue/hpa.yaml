{{- if .Values.insights.enabled }}
{{- if and .Values.insights.queue.enabled .Values.insights.queue.autoscaling.enabled (not .Values.insights.queue.autoscaling.keda.enabled) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "insights") }}-{{ .Values.insights.queue.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "insights") }}-{{ .Values.insights.queue.name }}
  minReplicas: {{ .Values.insights.queue.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.insights.queue.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.insights.queue.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.insights.queue.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.insights.queue.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.insights.queue.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
