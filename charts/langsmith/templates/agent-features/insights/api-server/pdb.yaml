{{- if .Values.insights.enabled }}
{{- if .Values.insights.apiServer.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "insights") }}-{{ .Values.insights.apiServer.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "insights") }}-{{ .Values.insights.apiServer.name }}
  {{- if hasKey .Values.insights.apiServer.pdb "minAvailable" }}
  minAvailable: {{ .Values.insights.apiServer.pdb.minAvailable }}
  {{- end }}
  {{- if hasKey .Values.insights.apiServer.pdb "maxUnavailable" }}
  maxUnavailable: {{ .Values.insights.apiServer.pdb.maxUnavailable }}
  {{- end }}
{{- end }}
{{- end }}
