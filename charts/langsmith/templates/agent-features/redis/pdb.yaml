{{- if or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{- if not .Values.agentsRedis.external.enabled }}
{{- if .Values.agentsRedis.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.agentsRedis.pdb.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.agentsRedis.pdb.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  {{- if .Values.agentsRedis.pdb.minAvailable }}
  minAvailable: {{ .Values.agentsRedis.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.agentsRedis.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.agentsRedis.pdb.maxUnavailable }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
