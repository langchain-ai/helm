{{- if or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{- if not .Values.agentsRedis.external.enabled }}
{{- $volumes := concat .Values.commonVolumes .Values.agentsRedis.deployment.volumes -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.agentsRedis.deployment.volumeMounts -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
    {{- with .Values.agentsRedis.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.agentsRedis.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  template:
    metadata:
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.agentsRedis.deployment.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
        {{- with .Values.agentsRedis.deployment.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.agentsRedis.deployment.priorityClassName }}
      priorityClassName: {{ .Values.agentsRedis.deployment.priorityClassName }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.agentsRedis.deployment.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "langsmith.podSecurityContext" (dict "Values" .Values "componentSecurityContext" .Values.agentsRedis.deployment.podSecurityContext) | nindent 8 }}
      serviceAccountName: {{ .Values.agentsRedis.serviceAccount.name | default (printf "%s-%s" (include "langsmith.fullname" .) .Values.agentsRedis.name) }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with .Values.agentsRedis.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          {{- with .Values.agentsRedis.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.agentsRedis.deployment.extraEnv }}
          env:
            {{- toYaml .Values.agentsRedis.deployment.extraEnv | nindent 12 }}
          {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "redisImage") | quote }}
          imagePullPolicy: {{ .Values.images.redisImage.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.agentsRedis.containerPort }}
              protocol: TCP
          {{- with .Values.agentsRedis.deployment.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentsRedis.deployment.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentsRedis.deployment.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.agentsRedis.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.agentsRedis.deployment.securityContext | nindent 12 }}
          {{- with .Values.agentsRedis.deployment.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentsRedis.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.agentsRedis.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agentsRedis.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
