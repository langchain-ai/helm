{{- if or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{- if not .Values.agentsRedis.external.enabled }}
{{- $volumes := concat .Values.commonVolumes .Values.agentsRedis.statefulSet.volumes -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.agentsRedis.statefulSet.volumeMounts -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
    {{- with .Values.agentsRedis.statefulSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.agentsRedis.statefulSet.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
  template:
    metadata:
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.agentsRedis.statefulSet.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
        {{- with .Values.agentsRedis.statefulSet.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.agentsRedis.statefulSet.priorityClassName }}
      priorityClassName: {{ .Values.agentsRedis.statefulSet.priorityClassName }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.agentsRedis.statefulSet.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "langsmith.podSecurityContext" (dict "Values" .Values "componentSecurityContext" .Values.agentsRedis.statefulSet.podSecurityContext) | nindent 8 }}
      serviceAccountName: {{ .Values.agentsRedis.serviceAccount.name | default (printf "%s-%s" (include "langsmith.fullname" .) .Values.agentsRedis.name) }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with concat .Values.commonInitContainers .Values.agentsRedis.statefulSet.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          {{- with .Values.agentsRedis.statefulSet.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.agentsRedis.statefulSet.extraEnv }}
          env:
            {{- toYaml .Values.agentsRedis.statefulSet.extraEnv | nindent 12 }}
          {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "redisImage") | quote }}
          imagePullPolicy: {{ .Values.images.redisImage.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.agentsRedis.containerPort }}
              protocol: TCP
          {{- with .Values.agentsRedis.statefulSet.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentsRedis.statefulSet.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agentsRedis.statefulSet.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.agentsRedis.statefulSet.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.agentsRedis.statefulSet.securityContext | nindent 12 }}
          {{- with .Values.agentsRedis.statefulSet.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.agentsRedis.statefulSet.persistence.enabled }}
          volumeMounts:
            - mountPath: /data
              name: data
            {{- with $volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with $volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.agentsRedis.statefulSet.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.agentsRedis.statefulSet.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.agentsRedis.statefulSet.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.statefulSet.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.statefulSet.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agentsRedis.statefulSet.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.agentsRedis.statefulSet.persistence.enabled }}
  {{- with .Values.agentsRedis.statefulSet.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
        {{- toYaml . | nindent 4 }}
  {{- end }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          {{- include "langsmith.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.agentsRedis.name }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.agentsRedis.statefulSet.persistence.size }}
        {{- if .Values.agentsRedis.statefulSet.persistence.storageClassName }}
        storageClassName: {{ .Values.agentsRedis.statefulSet.persistence.storageClassName }}
        {{- end }}
  {{- end }}
{{- end }}
{{- end }}
