{{- if or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{/*
  Bundled agents-redis secret: connection_url pointing to the in-cluster redis service.
*/}}
{{- if and (not .Values.agentsRedis.external.enabled) (not .Values.agentsRedis.external.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langsmith.fullname" . }}-agent-redis
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
data:
  connection_url: {{ printf "redis://%s-%s.%s.svc.%s:%v" (include "langsmith.fullname" .) .Values.agentsRedis.name (.Values.namespace | default .Release.Namespace) .Values.clusterDomain (toString .Values.agentsRedis.service.port) | b64enc }}
{{- end }}
---
{{/*
  External redis secret (when connectionUrl provided inline, not via existingSecretName).
*/}}
{{- if and .Values.agentsRedis.external.enabled .Values.agentsRedis.external.connectionUrl (not .Values.agentsRedis.external.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langsmith.fullname" . }}-agent-redis
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
data:
  connection_url: {{ .Values.agentsRedis.external.connectionUrl | b64enc }}
{{- end }}
{{- end }}
