{{- if or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{- if not .Values.agentsRedis.external.enabled }}
{{- if .Values.agentsRedis.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agentsRedis.serviceAccount.name | default (printf "%s-%s" (include "langsmith.fullname" .) .Values.agentsRedis.name) }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.agentsRedis.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.agentsRedis.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.agentsRedis.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}
