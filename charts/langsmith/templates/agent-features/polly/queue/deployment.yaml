{{- if .Values.polly.enabled }}
{{- if .Values.polly.queue.enabled -}}
{{- $volumes := concat .Values.commonVolumes .Values.polly.queue.deployment.volumes (include "langsmith.tlsVolumes" . | fromYamlArray) -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.polly.queue.deployment.volumeMounts (include "langsmith.tlsVolumeMounts" . | fromYamlArray) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "polly") }}-{{ .Values.polly.queue.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.polly.queue.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.polly.queue.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.polly.queue.autoscaling.enabled }}
  replicas: {{ .Values.polly.queue.deployment.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "polly") }}-{{ .Values.polly.queue.name }}
  template:
    metadata:
      annotations:
      {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
      {{- with .Values.polly.queue.deployment.annotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with .Values.polly.queue.deployment.labels }}
            {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "polly") }}-{{ .Values.polly.queue.name }}
    spec:
      serviceAccountName: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "polly") }}-{{ .Values.polly.queue.name }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.polly.queue.deployment.priorityClassName }}
      priorityClassName: {{ .Values.polly.queue.deployment.priorityClassName }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.polly.queue.deployment.terminationGracePeriodSeconds }}
      securityContext:
        {{- merge .Values.polly.queue.deployment.podSecurityContext (.Values.commonPodSecurityContext | default dict) | toYaml | nindent 8 }}
      {{- with .Values.commonInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.polly.queue.name }}
          command:
            - "/storage/queue_entrypoint.sh"
          env:
            {{- with .Values.commonEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: PORT
              value: {{ .Values.polly.queue.containerPort | quote }}
            - name: POSTGRES_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.agentFeatures.postgresSecretName" (dict "root" . "product" "polly") }}
                  key: postgres_connection_url
            - name: REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.agentFeatures.redisSecretName" (dict "root" . "product" "polly") }}
                  key: redis_connection_url
            - name: LANGGRAPH_CLOUD_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.secretsName" . }}
                  key: langsmith_license_key
                  optional: true
            - name: N_JOBS_PER_WORKER
              value: {{ .Values.polly.queue.numberOfJobsPerWorker | quote }}
            {{- with include "langsmith.polly.extraEnv" . | trim }}
              {{- . | nindent 12 }}
            {{- end }}
          {{- with .Values.polly.queue.deployment.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "pollyAgentImage") | quote }}
          imagePullPolicy: {{ .Values.images.pollyAgentImage.pullPolicy }}
          ports:
            - name: queue
              containerPort: {{ .Values.polly.queue.containerPort }}
              protocol: TCP
          startupProbe:
            {{- toYaml .Values.polly.queue.deployment.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.polly.queue.deployment.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.polly.queue.deployment.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.polly.queue.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.polly.queue.deployment.securityContext | nindent 12 }}
          {{- with .Values.polly.queue.deployment.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $volumeMounts }}
          volumeMounts:
              {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.polly.queue.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.polly.queue.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polly.queue.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polly.queue.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $volumes }}
      volumes:
          {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end}}
{{- end }}
