{{- if .Values.polly.enabled }}
{{- if .Values.polly.redis.pdb.enabled }}
{{- $componentName := include "langsmith.agentFeatures.componentName" (dict "root" . "product" "polly" "component" "redis") -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $componentName }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $componentName }}
  {{- if .Values.polly.redis.pdb.minAvailable }}
  minAvailable: {{ .Values.polly.redis.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.polly.redis.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.polly.redis.pdb.maxUnavailable }}
  {{- end }}
{{- end }}
{{- end }}
