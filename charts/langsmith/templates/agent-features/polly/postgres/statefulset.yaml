{{- if .Values.polly.enabled }}
{{- if not .Values.polly.postgres.external.enabled }}
{{- $volumes := concat .Values.commonVolumes .Values.polly.postgres.statefulSet.volumes -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.polly.postgres.statefulSet.volumeMounts -}}
{{- $componentName := include "langsmith.polly.postgresComponentName" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $componentName }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.polly.postgres.statefulSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.polly.postgres.statefulSet.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ $componentName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $componentName }}
  template:
    metadata:
      {{- with .Values.polly.postgres.statefulSet.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with .Values.polly.postgres.statefulSet.labels }}
            {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ $componentName }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.polly.postgres.statefulSet.priorityClassName }}
      priorityClassName: {{ .Values.polly.postgres.statefulSet.priorityClassName }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.polly.postgres.statefulSet.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.polly.postgres.statefulSet.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ $componentName }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      containers:
        - name: {{ .Values.polly.postgres.name }}
          {{- with .Values.polly.postgres.statefulSet.command }}
          command:
             {{ . }}
          {{- end }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.agentFeatures.postgresSecretName" (dict "root" . "product" "polly") }}
                  key: postgres_db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.agentFeatures.postgresSecretName" (dict "root" . "product" "polly") }}
                  key: postgres_password
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.agentFeatures.postgresSecretName" (dict "root" . "product" "polly") }}
                  key: postgres_user
            - name: PGDATA
              value: /var/lib/postgresql/data/postgres
            {{- with .Values.polly.postgres.statefulSet.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "postgresImage") | quote }}
          imagePullPolicy: {{ .Values.images.postgresImage.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.polly.postgres.containerPort }}
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -d postgres -U postgres
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -d postgres -U postgres
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 1
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -d postgres -U postgres
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            {{- toYaml .Values.polly.postgres.statefulSet.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.polly.postgres.statefulSet.securityContext | nindent 12 }}
          {{- with .Values.polly.postgres.statefulSet.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- with $volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.polly.postgres.statefulSet.persistence.enabled }}
            - mountPath: /var/lib/postgresql/data
              name: data
              subPath: postgres
            {{- end }}
          {{- with .Values.polly.postgres.statefulSet.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.polly.postgres.statefulSet.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.polly.postgres.statefulSet.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polly.postgres.statefulSet.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polly.postgres.statefulSet.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $volumes }}
      volumes:
          {{- toYaml . | nindent 8 }}
      {{- end }}
 {{- if .Values.polly.postgres.statefulSet.persistence.enabled }}
  {{- with .Values.polly.postgres.statefulSet.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
        {{- toYaml . | nindent 4 }}
  {{- end }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          {{- include "langsmith.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: {{ $componentName }}
      spec:

        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.polly.postgres.statefulSet.persistence.size }}
        {{- if .Values.polly.postgres.statefulSet.persistence.storageClassName }}
        storageClassName: {{ .Values.polly.postgres.statefulSet.persistence.storageClassName }}
        {{- end }}
  {{- end }}
{{- end}}
{{- end }}
