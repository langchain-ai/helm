{{- if .Values.polly.enabled }}
{{- if and (not .Values.polly.postgres.external.enabled) .Values.polly.postgres.serviceAccount.create -}}
{{- $componentSuffix := printf "%s-%s" .Values.polly.namePrefix .Values.polly.postgres.name -}}
{{- $componentPrefixMaxLen := int (sub 62 (len $componentSuffix)) -}}
{{- $componentPrefix := include "langsmith.fullname" . | trunc $componentPrefixMaxLen | trimSuffix "-" -}}
{{- $componentName := printf "%s-%s" $componentPrefix $componentSuffix -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $componentName }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.polly.postgres.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.polly.postgres.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}
{{- end }}
