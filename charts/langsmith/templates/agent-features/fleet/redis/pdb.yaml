{{- if .Values.fleet.enabled }}
{{- if .Values.fleet.redis.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "fleet") }}-{{ .Values.fleet.redis.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.agentFeatures.fullname" (dict "root" . "product" "fleet") }}-{{ .Values.fleet.redis.name }}
  {{- if .Values.fleet.redis.pdb.minAvailable }}
  minAvailable: {{ .Values.fleet.redis.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.fleet.redis.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.fleet.redis.pdb.maxUnavailable }}
  {{- end }}
{{- end }}
{{- end }}
