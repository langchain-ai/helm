{{- if .Values.fleet.enabled }}
{{- if not .Values.fleet.postgres.external.existingSecretName }}
{{- $componentName := include "langsmith.fleet.postgresComponentName" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langsmith.agentFeatures.postgresSecretName" (dict "root" . "product" "fleet") }}
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
data:
  {{- if .Values.fleet.postgres.external.enabled }}
  {{- if .Values.fleet.postgres.external.connectionUrl }}
  postgres_connection_url: {{ .Values.fleet.postgres.external.connectionUrl | b64enc }}
  {{- else }}
  postgres_connection_url: {{ printf "postgres://%s:%s@%s:%s/%s?sslmode=disable" .Values.fleet.postgres.external.user .Values.fleet.postgres.external.password .Values.fleet.postgres.external.host (toString .Values.fleet.postgres.external.port) .Values.fleet.postgres.external.database | b64enc }}
  {{- end }}
  {{- else }}
  postgres_user: {{ .Values.fleet.postgres.external.user | b64enc }}
  postgres_password: {{ .Values.fleet.postgres.external.password | b64enc }}
  postgres_db: {{ .Values.fleet.postgres.external.database | b64enc }}
  postgres_connection_url: {{ printf "postgres://%s:%s@%s.%s.svc.%s:%s/%s?sslmode=disable" .Values.fleet.postgres.external.user .Values.fleet.postgres.external.password $componentName (default .Release.Namespace .Values.namespace) .Values.clusterDomain (toString .Values.fleet.postgres.service.port) .Values.fleet.postgres.external.database | b64enc }}
  {{- end}}
{{- end }}
{{- end }}
