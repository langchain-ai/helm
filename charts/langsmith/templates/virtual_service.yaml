{{- if .Values.istioGateway.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "langsmith.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.istioGateway.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.istioGateway.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.config.hostname }}
  hosts:
  - {{ include "langsmith.hostnameWithoutProtocol" . | quote }}
  {{- else }}
  hosts:
  - "*"
  {{- end }}
  gateways:
  {{- if .Values.istioGateway.namespace }}
  - {{ .Values.istioGateway.namespace }}/{{ .Values.istioGateway.name }}
  {{- else }}
  - {{ .Values.istioGateway.name }}
  {{- end }}
  http:
  {{- if and (default true .Values.agentFeatures.exposePaths) .Values.agentFeatures.fleet.enabled }}
  - match:
    - uri:
        prefix: {{ include "langsmith.agentFeatures.agentPathPrefix" (dict "root" . "segment" "fleet") }}
    route:
    - destination:
        host: {{ include "langsmith.agentFeatures.apiServerK8sServiceName" (dict "root" . "feature" "fleet" "chartName" "lgp-fleet") }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        port:
          number: {{ include "langsmith.agentFeatures.defaultApiServerHttpPort" . }}
  {{- end }}
  {{- if and (default true .Values.agentFeatures.exposePaths) .Values.agentFeatures.insights.enabled }}
  - match:
    - uri:
        prefix: {{ include "langsmith.agentFeatures.agentPathPrefix" (dict "root" . "segment" "insights") }}
    route:
    - destination:
        host: {{ include "langsmith.agentFeatures.apiServerK8sServiceName" (dict "root" . "feature" "insights" "chartName" "lgp-insights") }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        port:
          number: {{ include "langsmith.agentFeatures.defaultApiServerHttpPort" . }}
  {{- end }}
  {{- if and (default true .Values.agentFeatures.exposePaths) .Values.agentFeatures.polly.enabled }}
  - match:
    - uri:
        prefix: {{ include "langsmith.agentFeatures.agentPathPrefix" (dict "root" . "segment" "polly") }}
    route:
    - destination:
        host: {{ include "langsmith.agentFeatures.apiServerK8sServiceName" (dict "root" . "feature" "polly" "chartName" "lgp-polly") }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        port:
          number: {{ include "langsmith.agentFeatures.defaultApiServerHttpPort" . }}
  {{- end }}
  - match:
    - uri:
        prefix: {{ ternary "/" (printf "/%s" .Values.config.basePath) (empty .Values.config.basePath) }}
    route:
    - destination:
        host: {{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        port:
          number: {{ .Values.frontend.service.httpPort }}
{{- end }}
