{{- /*
================================================================================
CONFIGURATION VALIDATION
================================================================================

This template validates configuration and prevents deployment when:
1. Deprecated values are detected
2. Invalid or conflicting configuration is present
3. Required values are missing or malformed

This template intentionally does not render any Kubernetes resources.
It only performs validation checks and fails template rendering if issues are found.

Set config.skipValidation to true to skip all validation checks (e.g. for
AWS Marketplace Helm template verification).
================================================================================
*/}}

{{- if not .Values.config.skipValidation -}}

{{- /* Validate deprecated fleet server value keys */ -}}
{{- if hasKey .Values "agentBuilderToolServer" -}}
{{- fail "agentBuilderToolServer is deprecated. Please use fleetToolServer." -}}
{{- end -}}
{{- if hasKey .Values "agentBuilderTriggerServer" -}}
{{- fail "agentBuilderTriggerServer is deprecated. Please use fleetTriggerServer." -}}
{{- end -}}
{{- if hasKey .Values.images "agentBuilderToolServerImage" -}}
{{- fail "images.agentBuilderToolServerImage is deprecated. Please use images.fleetToolServerImage." -}}
{{- end -}}
{{- if hasKey .Values.images "agentBuilderTriggerServerImage" -}}
{{- fail "images.agentBuilderTriggerServerImage is deprecated. Please use images.fleetTriggerServerImage." -}}
{{- end -}}

{{- /* Validate ingress configuration */ -}}
# Fail if none of ingress, gateway, or istioGateway are enabled and LangSmith Deployment is enabled with the chart-managed frontend
{{- if and .Values.frontend.enabled (not .Values.ingress.enabled) (not .Values.gateway.enabled) (not .Values.istioGateway.enabled) .Values.config.deployment.enabled }}
{{- fail "Either ingress, gateway, or istioGateway must be enabled if LangSmith Deployments is enabled." -}}
{{- end -}}

{{- /* Validate frontend configuration */ -}}
# Fail if frontend is disabled while a chart-managed frontend route is enabled
{{- if not .Values.frontend.enabled }}
{{- if or .Values.ingress.enabled .Values.gateway.enabled -}}
{{- fail "frontend.enabled must be true when ingress or gateway is enabled. These resources route traffic to the frontend service." -}}
{{- end -}}
{{- end -}}

# Fail if Istio + LangSmith Deployments + basePath is set without a distinct deployments base path
{{- if and .Values.istioGateway.enabled .Values.frontend.enabled .Values.config.deployment.enabled .Values.config.basePath -}}
  {{- if or (not .Values.config.deployment.basePath) (eq .Values.config.deployment.basePath .Values.config.basePath) -}}
{{- fail "When istioGateway is enabled with LangSmith Deployments and config.basePath is set, you must set config.deployment.basePath to a different value to avoid overlapping VirtualService prefixes. Istio does not deterministically guarantee longest-prefix routing across multiple VirtualServices." -}}
  {{- end -}}
{{- end -}}

# Fail if hostname is missing when deployment is enabled
{{- if and .Values.config.deployment.enabled (not .Values.config.hostname) }}
{{- fail "config.hostname is required when LangSmith Deployments is enabled." -}}
{{- end -}}

# Fail if rootDomain is missing when deployment is enabled
{{- if .Values.config.deployment.rootDomain }}
{{- fail "config.rootDomain is deprecated. Please use config.hostname" -}}
{{- end -}}

# Fail if more than one ingress type is enabled
{{- $enabledCount := 0 -}}
{{- if .Values.ingress.enabled }}{{ $enabledCount = add1 $enabledCount }}{{- end -}}
{{- if .Values.gateway.enabled }}{{ $enabledCount = add1 $enabledCount }}{{- end -}}
{{- if .Values.istioGateway.enabled }}{{ $enabledCount = add1 $enabledCount }}{{- end -}}
{{- if gt $enabledCount 1 -}}
{{- fail "Only one of ingress, gateway, or istioGateway can be enabled at the same time." -}}
{{- end -}}
{{- /* Validate authentication configuration */ -}}
{{- if and .Values.config.basicAuth.enabled .Values.config.oauth.enabled -}}
{{- fail "Basic auth and OAuth are both enabled. Please enable only one." -}}
{{- end -}}

{{- /* Validate langsmithLicenseKey and apikeysalt are set */ -}}
{{- if not .Values.config.existingSecretName -}}
{{- if not .Values.config.apiKeySalt -}}
{{- fail "config.apiKeySalt is required. This may have previously been set to your license key by default. Set this value to the license key to avoid invalidating existing API Keys. This can alternatively be set within .Values.config.existingSecretName." -}}
{{- end -}}
{{- if not .Values.config.langsmithLicenseKey -}}
{{- fail "config.langsmithLicenseKey is required.  This can alternatively be set within .Values.config.existingSecretName." -}}
{{- end -}}
{{- end -}}

{{- if and (not .Values.config.basicAuth.enabled) (not .Values.config.oauth.enabled) -}}
{{- fail "Neither Basic auth nor OAuth are enabled. Please enable one of them." -}}
{{- end -}}
{{- if and (ne .Values.config.authType "mixed") (ne .Values.config.authType "oauth") -}}
{{- fail "config.authType must be either 'mixed' or 'oauth'." -}}
{{- end -}}
{{- if and (.Values.config.basicAuth.enabled) (ne .Values.config.authType "mixed") -}}
{{- fail "Basic auth is enabled but config.authType is not set to 'mixed'." -}}
{{- end -}}

{{- /* Validate initial org admin email */ -}}
{{- if or .Values.config.basicAuth.enabled -}}
{{- if not (or .Values.config.initialOrgAdminEmail .Values.config.basicAuth.initialOrgAdminEmail) -}}
{{- fail "initialOrgAdminEmail is required if basic auth is enabled. Please set config.initialOrgAdminEmail." -}}
{{- end -}}
{{- end -}}

{{- /* Validate custom cert */ -}}
{{- if .Values.config.customCa.secretName -}}
{{- if not .Values.config.customCa.secretKey -}}
{{- fail "config.customCa.secretKey is required when config.customCa.secretName is set." -}}
{{- end -}}
{{- end -}}

{{- /* Validate redis cluster configuration */ -}}
{{- if .Values.redis.external.cluster.enabled -}}
{{- if not .Values.redis.external.enabled -}}
{{- fail "redis.external.enabled must be true when redis.external.cluster.enabled is true." -}}
{{- end -}}
{{- end -}}

{{- /* Validate password requirements */ -}}
{{- if and .Values.config.basicAuth.enabled (not .Values.config.existingSecretName) }}
{{- $password := .Values.config.basicAuth.initialOrgAdminPassword -}}
{{- if lt (len $password) 12 -}}
{{- fail "Admin password must be at least 12 characters long" -}}
{{- end -}}
{{- if not (regexMatch "[a-z]" $password) -}}
{{- fail "Admin password must contain at least one lowercase letter" -}}
{{- end -}}
{{- if not (regexMatch "[A-Z]" $password) -}}
{{- fail "Admin password must contain at least one uppercase letter" -}}
{{- end -}}
{{- if not (regexMatch `[!#$%()+,./:?@\[\]\\^_{~}-]` $password) -}}
{{- fail "Admin password must contain at least one symbol from: !#$%()+,-./:?@[\\]^_{~}" -}}
{{- end -}}
{{- end }}

{{- /* Validate operator/listener configuration */ -}}
{{- $hasListenerTemplates := and (hasKey .Values "listener") (hasKey .Values.listener "templates") (not (empty .Values.listener.templates)) -}}
{{- if $hasListenerTemplates -}}
{{- fail "templates have moved to the operator. Please move your values from .Values.listener.templates to .Values.operator.templates." -}}
{{- end -}}

{{- /* Validate breaking changes from v12+ */ -}}
{{- if hasKey .Values.config "langgraphPlatform" }}
{{- fail "As of v12, config.langgraphPlatform has been moved to config.deployment. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.config.deployment "langgraphPlatformLicenseKey" }}
{{- fail "As of v12, langgraphPlatform no longer needs a dedicated license key. You can remove this value." }}
{{- end }}

{{- if hasKey .Values.config "subdomain" }}
{{- fail "As of v12, istioGateway.subdomain has been moved to istioGateway.basePath. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.ingress "hostname" }}
{{- fail "As of v12, ingress.hostname has been moved to config.hostname. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.ingress "subdomain" }}
{{- fail "As of v12, ingress.subdomain has been moved to config.basePath. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.gateway "hostname" }}
{{- fail "As of v12, gateway.hostname has been moved to config.hostname. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.gateway "subdomain" }}
{{- fail "As of v12, gateway.subdomain has been moved to config.basePath. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.istioGateway "hostname" }}
{{- fail "As of v12, istioGateway.hostname has been moved to config.hostname. Please update your values.yaml file." }}
{{- end }}

{{- if hasKey .Values.istioGateway "subdomain" }}
{{- fail "As of v12, istioGateway.subdomain has been moved to config.basePath. Please update your values.yaml file." }}
{{- end }}

{{- if and .Values.config.observability.tracing.enabled (not .Values.config.observability.tracing.endpoint) -}}
{{- fail "When tracing is enabled (config.observability.tracing.enabled=true), config.observability.tracing.endpoint must be provided" -}}
{{- end -}}

{{- if and .Values.config.blobStorage.enabled (not .Values.config.blobStorage.engine) -}}
{{- fail "When blob storage is enabled (config.blobStorage.enabled=true), config.blobStorage.engine must be one of [S3, GCS, Azure]" -}}
{{- end -}}

{{- if and .Values.config.blobStorage.enabled (not (or (eq .Values.config.blobStorage.engine "S3") (eq .Values.config.blobStorage.engine "s3") (eq .Values.config.blobStorage.engine "GCS") (eq .Values.config.blobStorage.engine "gcs") (eq .Values.config.blobStorage.engine "Azure") (eq .Values.config.blobStorage.engine "azure"))) -}}
{{- fail "When blob storage is enabled (config.blobStorage.enabled=true), config.blobStorage.engine must be one of [S3, GCS, Azure]" -}}
{{- end -}}

{{- /* Validate postgres mTLS configuration */ -}}
{{- if and .Values.postgres.external.clientCert.secretName (not .Values.postgres.external.customTls) -}}
{{- fail "postgres.external.customTls must be true when postgres.external.clientCert.secretName is set." -}}
{{- end -}}

{{- /* Validate clickhouse mTLS configuration */ -}}
{{- if and .Values.clickhouse.external.clientCert.secretName (not .Values.clickhouse.external.existingSecretName) (not .Values.clickhouse.external.tls) -}}
{{- fail "clickhouse.external.tls must be true when clickhouse.external.clientCert.secretName is set and the value is not being fetched from an existing secret." -}}
{{- end -}}

{{- /* Validate SmithDB configuration */ -}}
{{- if .Values.smithdb.enabled -}}
{{- if not .Values.smithdb.config.existingSecretName -}}
{{- fail "smithdb.config.existingSecretName is required when smithdb.enabled is true." -}}
{{- end -}}
{{- range $keyName := list "hostSecretKey" "databaseSecretKey" "usernameSecretKey" "passwordSecretKey" -}}
{{- $keyValue := get $.Values.smithdb.config.metastore $keyName -}}
{{- if not $keyValue -}}
{{- fail (printf "smithdb.config.metastore.%s is required when smithdb.enabled is true." $keyName) -}}
{{- end -}}
{{- end -}}
{{- $objectStoreType := lower .Values.smithdb.config.objectStore.type -}}
{{- if not (or (eq $objectStoreType "s3") (eq $objectStoreType "gcs")) -}}
{{- fail "smithdb.config.objectStore.type must be one of [s3, gcs]." -}}
{{- end -}}
{{- if not .Values.smithdb.config.objectStore.bucket -}}
{{- fail "smithdb.config.objectStore.bucket is required when smithdb.enabled is true." -}}
{{- end -}}
{{- $smithdbWorkloads := dict
  "query" .Values.smithdb.query
  "ingestion" .Values.smithdb.ingestion
  "compaction" .Values.smithdb.compaction
  "compactionWorker" .Values.smithdb.compactionWorker
  "client" .Values.smithdb.client
  "clusterManager" .Values.smithdb.clusterManager
-}}
{{- range $workloadName, $workload := $smithdbWorkloads -}}
{{- if and $workload.enabled (lt (int $workload.deployment.replicas) 1) -}}
{{- fail (printf "smithdb.%s.deployment.replicas must be greater than 0 when the workload is enabled." $workloadName) -}}
{{- end -}}
{{- end -}}
{{- $smithdbServiceWorkloads := dict
  "query" .Values.smithdb.query
  "ingestion" .Values.smithdb.ingestion
  "compaction" .Values.smithdb.compaction
  "clusterManager" .Values.smithdb.clusterManager
-}}
{{- range $workloadName, $workload := $smithdbServiceWorkloads -}}
{{- if and $workload.enabled $workload.service.type (ne $workload.service.type "ClusterIP") -}}
{{- fail (printf "smithdb.%s.service.type must be ClusterIP." $workloadName) -}}
{{- end -}}
{{- end -}}
{{- if and .Values.smithdb.compactionWorker.enabled (not .Values.smithdb.compaction.enabled) -}}
{{- fail "smithdb.compaction.enabled must be true when smithdb.compactionWorker.enabled is true." -}}
{{- end -}}
{{- if and .Values.smithdb.compactionWorker.enabled .Values.smithdb.compactionWorker.maxConcurrentJobs (lt (int .Values.smithdb.compactionWorker.maxConcurrentJobs) 1) -}}
{{- fail "smithdb.compactionWorker.maxConcurrentJobs must be greater than 0 when set." -}}
{{- end -}}
{{- if and .Values.smithdb.langsmith.dualIngest.enabled (not .Values.smithdb.ingestion.enabled) -}}
{{- fail "smithdb.ingestion.enabled must be true when smithdb.langsmith.dualIngest.enabled is true." -}}
{{- end -}}
{{- if and .Values.smithdb.langsmith.frontend.useSmithDBEndpoints (not .Values.smithdb.query.enabled) -}}
{{- fail "smithdb.query.enabled must be true when smithdb.langsmith.frontend.useSmithDBEndpoints is true." -}}
{{- end -}}
{{- if and .Values.smithdb.langsmith.clusterManager.enabled (not .Values.smithdb.clusterManager.enabled) -}}
{{- fail "smithdb.clusterManager.enabled must be true when smithdb.langsmith.clusterManager.enabled is true." -}}
{{- end -}}
{{- if and .Values.smithdb.client.enabled .Values.smithdb.client.useClusterManager (not .Values.smithdb.clusterManager.enabled) -}}
{{- fail "smithdb.clusterManager.enabled must be true when smithdb.client.useClusterManager is true." -}}
{{- end -}}
{{- if .Values.smithdb.client.enabled -}}
{{- if not .Values.smithdb.query.enabled -}}
{{- fail "smithdb.query.enabled must be true when smithdb.client.enabled is true." -}}
{{- end -}}
{{- if not .Values.smithdb.ingestion.enabled -}}
{{- fail "smithdb.ingestion.enabled must be true when smithdb.client.enabled is true." -}}
{{- end -}}
{{- if not .Values.smithdb.client.multitenant -}}
{{- if not .Values.smithdb.client.tenantId -}}
{{- fail "smithdb.client.tenantId is required when smithdb.client.enabled is true and smithdb.client.multitenant is false." -}}
{{- end -}}
{{- if not .Values.smithdb.client.sessionId -}}
{{- fail "smithdb.client.sessionId is required when smithdb.client.enabled is true and smithdb.client.multitenant is false." -}}
{{- end -}}
{{- if not (regexMatch "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" .Values.smithdb.client.tenantId) -}}
{{- fail "smithdb.client.tenantId must be a valid UUID when set." -}}
{{- end -}}
{{- if not (regexMatch "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" .Values.smithdb.client.sessionId) -}}
{{- fail "smithdb.client.sessionId must be a valid UUID when set." -}}
{{- end -}}
{{- end -}}
{{- if lt (int .Values.smithdb.client.queryQps) 1 -}}
{{- fail "smithdb.client.queryQps must be greater than 0 when smithdb.client.enabled is true." -}}
{{- end -}}
{{- if lt (int .Values.smithdb.client.ingestionQps) 1 -}}
{{- fail "smithdb.client.ingestionQps must be greater than 0 when smithdb.client.enabled is true." -}}
{{- end -}}
{{- if empty .Values.smithdb.client.queries -}}
{{- fail "smithdb.client.queries must include at least one query when smithdb.client.enabled is true." -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{- /* Validate agent builder configuration */ -}}
{{- if .Values.config.agentBuilder.enabled -}}
{{- if and (not .Values.config.agentBuilder.encryptionKey) (not .Values.config.existingSecretName) -}}
{{- fail "config.agentBuilder.encryptionKey is required when Agent Builder is enabled. Generate one with: python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\"" -}}
{{- end -}}
{{- if not .Values.config.deployment.enabled -}}
{{- fail "config.deployment.enabled must be true when agentBuilder is enabled. Agent Builder requires LangSmith Deployments." -}}
{{- end -}}
{{- end -}}

{{- /* The bundled-agent bootstrap path was removed for Insights and Polly.
       Reject any presence of config.insights / config.polly and direct
       users at the top-level insights / polly blocks. */ -}}
{{- if hasKey .Values.config "insights" -}}
{{- fail "config.insights is no longer supported (the bundled-agent bootstrap path was removed in chart 0.15.1). Use the top-level insights block: insights.enabled, insights.encryptionKey, etc." -}}
{{- end -}}
{{- if hasKey .Values.config "polly" -}}
{{- fail "config.polly is no longer supported (the bundled-agent bootstrap path was removed in chart 0.15.1). Use the top-level polly block: polly.enabled, polly.encryptionKey, etc." -}}
{{- end -}}

{{- /* Validate autoscaling configuration for all services */ -}}
{{- $autoscalingServices := dict
  "aceBackend" .Values.aceBackend.autoscaling
  "backend" .Values.backend.autoscaling
  "frontend" .Values.frontend.autoscaling
  "hostBackend" .Values.hostBackend.autoscaling
  "listener" .Values.listener.autoscaling
  "platformBackend" .Values.platformBackend.autoscaling
  "playground" .Values.playground.autoscaling
  "queue" .Values.queue.autoscaling
  "ingestQueue" .Values.ingestQueue.autoscaling
-}}
{{- range $serviceName, $autoscaling := $autoscalingServices -}}
{{- /* Validate that both HPA and KEDA are not enabled at the same time */ -}}
{{- if and $autoscaling.hpa.enabled $autoscaling.keda.enabled -}}
{{- fail (printf "Only one of %s.autoscaling.hpa.enabled or %s.autoscaling.keda.enabled can be enabled at the same time." $serviceName $serviceName) -}}
{{- end -}}
{{- /* Validate deprecated autoscaling values */ -}}
{{- if hasKey $autoscaling "createHpa" -}}
{{- fail (printf "%s.autoscaling.createHpa is deprecated. Please use %s.autoscaling.hpa.enabled and/or %s.autoscaling.keda.enabled instead." $serviceName $serviceName $serviceName) -}}
{{- end -}}
{{- if hasKey $autoscaling "type" -}}
{{- fail (printf "%s.autoscaling.type is deprecated. Please use %s.autoscaling.hpa.enabled and/or %s.autoscaling.keda.enabled instead." $serviceName $serviceName $serviceName) -}}
{{- end -}}
{{- if hasKey $autoscaling "enabled" -}}
{{- fail (printf "%s.autoscaling.enabled is deprecated. Please use %s.autoscaling.hpa.enabled and/or %s.autoscaling.keda.enabled instead." $serviceName $serviceName $serviceName) -}}
{{- end -}}
{{- end -}}

{{- end -}}{{- /* end skipValidation */ -}}

{{- /* Validate agent feature (fleet/insights/polly) configuration */ -}}
{{- $anyAgentEnabled := or .Values.fleet.enabled .Values.insights.enabled .Values.polly.enabled }}
{{- $allPgUrls := list }}
{{- /* Include the main LangSmith postgres URL if determinable */ -}}
{{- if and .Values.postgres.external.enabled (not .Values.postgres.external.existingSecretName) }}
{{- $mainPg := "" }}
{{- if .Values.postgres.external.connectionUrl }}
{{- $mainPg = trimAll " " .Values.postgres.external.connectionUrl }}
{{- else if .Values.postgres.external.host }}
{{- $mainPg = printf "postgres://%s:%s@%s:%s/%s?sslmode=disable" .Values.postgres.external.user .Values.postgres.external.password .Values.postgres.external.host (toString .Values.postgres.external.port) .Values.postgres.external.database }}
{{- end }}
{{- if $mainPg }}
{{- $allPgUrls = append $allPgUrls $mainPg }}
{{- end }}
{{- end }}
{{- $agentPairs := list (dict "n" "fleet") (dict "n" "insights") (dict "n" "polly") }}
{{- range $pair := $agentPairs }}
{{- $fn := index $pair "n" }}
{{- $feat := index $.Values $fn }}
{{- if $feat.enabled }}
{{- if and (not $feat.encryptionKey) (not $.Values.config.existingSecretName) }}
{{- fail (printf "%s.encryptionKey is required when %s.enabled is true (not needed if config.existingSecretName is set with the key already present)" $fn $fn) }}
{{- end }}
{{- if $feat.postgres.external.enabled }}
{{- if not $feat.postgres.external.existingSecretName }}
{{- $pg := "" }}
{{- if $feat.postgres.external.connectionUrl }}
{{- $pg = trimAll " " $feat.postgres.external.connectionUrl }}
{{- else if not $feat.postgres.external.host }}
{{- fail (printf "%s.postgres.external.host or connectionUrl or existingSecretName is required when %s.postgres.external.enabled is true" $fn $fn) }}
{{- else }}
{{- $pg = printf "postgres://%s:%s@%s:%s/%s?sslmode=disable" $feat.postgres.external.user $feat.postgres.external.password $feat.postgres.external.host (toString $feat.postgres.external.port) $feat.postgres.external.database }}
{{- end }}
{{- if $pg }}
{{- $allPgUrls = append $allPgUrls $pg }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if and (gt (len $allPgUrls) 0) (ne (len $allPgUrls) (len (uniq $allPgUrls))) }}
{{- fail "All postgres connection URLs (langsmith, fleet, insights, polly) must be unique. Duplicate URLs were detected." }}
{{- end }}

{{- /* Validate per-agent redis configuration */ -}}
{{- range $pair := $agentPairs }}
{{- $fn := index $pair "n" }}
{{- $feat := index $.Values $fn }}
{{- if $feat.enabled }}
{{- if $feat.redis.external.enabled }}
{{- if and (not $feat.redis.external.connectionUrl) (not $feat.redis.external.existingSecretName) }}
{{- fail (printf "%s.redis.external.connectionUrl or %s.redis.external.existingSecretName is required when %s.redis.external.enabled is true" $fn $fn $fn) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
