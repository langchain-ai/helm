{{- define "frontendEnvVars" -}}
- name: VITE_SELF_HOSTED_CLIO_ENABLED
  value: {{ (or .Values.config.insights.enabled .Values.agentFeatures.insights.enabled) | quote }}
- name: VITE_SELF_HOSTED_POLLY_ENABLED
  value: {{ (or .Values.config.polly.enabled .Values.agentFeatures.polly.enabled) | quote }}
{{- /* Agent Builder OAuth provider IDs for frontend */ -}}
{{- $googleOAuth := .Values.config.agentBuilder.oauth.googleOAuthProvider | default .Values.agentFeatures.fleet.oauth.googleOAuthProvider }}
{{- $slackOAuth := .Values.config.agentBuilder.oauth.slackOAuthProvider | default .Values.agentFeatures.fleet.oauth.slackOAuthProvider }}
{{- $githubOAuth := .Values.config.agentBuilder.oauth.githubOAuthProvider | default .Values.agentFeatures.fleet.oauth.githubOAuthProvider }}
{{- if $googleOAuth }}
- name: VITE_GOOGLE_OAUTH_PROVIDER
  value: {{ $googleOAuth | quote }}
{{- end }}
{{- if $slackOAuth }}
- name: VITE_SLACK_OAUTH_PROVIDER
  value: {{ $slackOAuth | quote }}
{{- end }}
{{- if $githubOAuth }}
- name: VITE_GITHUB_OAUTH_PROVIDER
  value: {{ $githubOAuth | quote }}
{{- end }}
{{- if .Values.config.oauth.enabled }}
- name: VITE_OAUTH_CLIENT_ID
  valueFrom:
    secretKeyRef:
      key: oauth_client_id
      name: {{ include "langsmith.secretsName" .}}
      optional: {{ .Values.config.disableSecretCreation }}
- name: VITE_OAUTH_ISSUER_URL
  valueFrom:
    secretKeyRef:
      key: oauth_issuer_url
      name: {{ include "langsmith.secretsName" .}}
      optional: {{ .Values.config.disableSecretCreation }}
{{- end }}
{{- if .Values.config.basePath }}
- name: VITE_SUBDOMAIN
  value: {{ .Values.config.basePath }}
{{- end }}
{{- if .Values.config.customLogo.enabled }}
- name: VITE_CUSTOM_LOGO_URL
  value: {{ .Values.config.customLogo.logoUrl | quote }}
- name: VITE_CO_BRANDING_ENABLED
  value: {{ .Values.config.customLogo.coBrandingEnabled | quote }}
{{- end }}
{{- if .Values.config.customErrorSupportMessage }}
- name: VITE_CUSTOM_ERROR_SUPPORT_MESSAGE
  value: {{ .Values.config.customErrorSupportMessage | quote }}
{{- end }}
{{- if .Values.config.deployment.enabled }}
- name: VITE_HOST_ENABLED
  value: "1"
{{- end }}
{{- if .Values.config.googleIapEnabled }}
- name: VITE_GOOGLE_IAP_ENABLED
  value: "true"
{{- end }}
{{- /* When using agentFeatures (standalone), inject the VITE vars that the bootstrap configmaps would otherwise provide */ -}}
{{- if and .Values.agentFeatures.fleet.enabled .Values.config.hostname }}
{{- $baseURL := include "langsmith.hostnameWithProtocol" . | trimSuffix "/" }}
{{- $agentPath := include "langsmith.agentFeatures.agentPathPrefix" (dict "root" . "segment" "fleet") }}
- name: VITE_AGENT_BUILDER_DEPLOYMENT_URL_PUBLIC
  value: {{ printf "%s%s" $baseURL $agentPath | quote }}
- name: LANGGRAPH_API_URL_PUBLIC
  value: {{ printf "%s%s" $baseURL $agentPath | quote }}
- name: VITE_AGENT_BUILDER_MCP_SERVER_URL
  value: {{ printf "%s/mcp" $baseURL | quote }}
- name: VITE_AGENT_BUILDER_TRIGGERS_API_URL
  value: {{ $baseURL | quote }}
{{- end }}
{{- if and .Values.agentFeatures.polly.enabled .Values.config.hostname }}
{{- $baseURL := include "langsmith.hostnameWithProtocol" . | trimSuffix "/" }}
{{- $agentPath := include "langsmith.agentFeatures.agentPathPrefix" (dict "root" . "segment" "polly") }}
- name: VITE_POLLY_DEPLOYMENT_URL
  value: {{ printf "%s%s" $baseURL $agentPath | quote }}
{{- end }}
{{- end -}}
{{- if .Values.frontend.enabled }}
{{- $envVars := concat .Values.commonEnv (include "frontendEnvVars" . | fromYamlArray) .Values.frontend.deployment.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
{{- $volumes := concat .Values.commonVolumes .Values.frontend.deployment.volumes -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.frontend.deployment.volumeMounts -}}
{{- /* Validate nginx mounts when readOnlyRootFilesystem is enabled (nginx 1.29+ uses /run/nginx.pid) */ -}}
{{- if .Values.frontend.deployment.securityContext.readOnlyRootFilesystem }}
{{- $hasNginxMount := false }}
{{- $hasVarRunMount := false }}
{{- $hasRunMount := false }}
{{- $hasVarCacheNginxMount := false }}
{{- range $volumeMounts }}
  {{- if eq .mountPath "/var/lib/nginx" }}
    {{- $hasNginxMount = true }}
  {{- end }}
  {{- if eq .mountPath "/var/run" }}
    {{- $hasVarRunMount = true }}
  {{- end }}
  {{- if eq .mountPath "/run" }}
    {{- $hasRunMount = true }}
  {{- end }}
  {{- if eq .mountPath "/var/cache/nginx" }}
    {{- $hasVarCacheNginxMount = true }}
  {{- end }}
{{- end }}
{{- if not (and $hasNginxMount $hasVarRunMount $hasRunMount $hasVarCacheNginxMount) }}
{{- fail "ERROR: When frontend.deployment.securityContext.readOnlyRootFilesystem is true, you must mount /var/lib/nginx, /var/run, /run, and /var/cache/nginx as writable volumes. Add emptyDir volumes for 'var-lib-nginx', 'var-run', 'run', and 'var-cache-nginx'. See read_only config example." }}
{{- end }}
{{- end }}
{{- if .Values.frontend.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with.Values.frontend.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with.Values.frontend.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not (or .Values.frontend.autoscaling.hpa.enabled .Values.frontend.autoscaling.keda.enabled) }}
  replicas: {{ .Values.frontend.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}
  template:
    metadata:
      annotations:
      {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
      {{- include "langsmith.checksumAnnotations" . | nindent 8 }}
      {{- with .Values.frontend.deployment.annotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with.Values.frontend.deployment.labels }}
            {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.frontend.deployment.terminationGracePeriodSeconds }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "langsmith.podSecurityContext" (dict "Values" .Values "componentSecurityContext" .Values.frontend.deployment.podSecurityContext) | nindent 8 }}
      serviceAccountName: {{ include "frontend.serviceAccountName" . }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with concat .Values.commonInitContainers .Values.frontend.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.frontend.name }}
          {{- with.Values.frontend.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- with $envVars }}
              {{ toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "langsmith.fullname" . }}-config
            {{- if .Values.config.agentBuilder.enabled }}
            - configMapRef:
                name: {{ include "langsmith.fullname" . }}-agent-builder-config
                optional: true
            {{- end }}
            {{- if .Values.config.polly.enabled }}
            - configMapRef:
                name: {{ include "langsmith.fullname" . }}-polly-config
                optional: true
            {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "frontendImage") | quote }}
          imagePullPolicy: {{ .Values.images.frontendImage.pullPolicy }}
          ports:
            - name: frontend
              containerPort: {{ ternary .Values.frontend.ssl.port .Values.frontend.containerPort .Values.frontend.ssl.enabled }}
              protocol: TCP
          {{- with .Values.frontend.deployment.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.deployment.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.deployment.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.deployment.securityContext | nindent 12 }}
          {{- with .Values.frontend.deployment.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- with $volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            - mountPath: /etc/nginx/conf.d/default.conf
              name: nginx-conf
              subPath: nginx.conf
              readOnly: true
          {{- with .Values.frontend.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.frontend.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.frontend.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.frontend.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- with $volumes }}
            {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: nginx-conf
          configMap:
            {{- if .Values.frontend.existingConfigMapName }}
            name: {{ .Values.frontend.existingConfigMapName }}
            {{- else }}
            name: {{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}
            {{- end }}
            items:
              - key: nginx.conf
                path: nginx.conf
{{- if .Values.frontend.rollout.enabled }}
  strategy:
    {{- toYaml .Values.frontend.rollout.strategy | nindent 4 }}
{{- end }}
{{- end }}
