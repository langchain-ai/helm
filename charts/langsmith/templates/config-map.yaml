# Contains environment variables that may need to be overwritten by extraEnvs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "langsmith.fullname" . }}-config
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
data:
  {{- if and .Values.config.oauth.enabled (eq .Values.config.authType "mixed") }}
  VITE_BACKEND_AUTH_TYPE: "mixed"
  AUTH_TYPE: "mixed"
  BASIC_AUTH_ENABLED: "false"
  INITIAL_ORG_NAME: {{ .Values.config.initialOrgName }}
  DEFAULT_WORKSPACE_NAME: {{ .Values.config.defaultWorkspaceName }}
  OAUTH_SCOPES: {{ .Values.config.oauth.oauthScopes }}
  OAUTH_SESSION_MAX_SEC: {{ .Values.config.oauth.oauthSessionMaxSec | quote }}
  {{- else if .Values.config.oauth.enabled }}
  VITE_BACKEND_AUTH_TYPE: "oauth"
  AUTH_TYPE: "oauth"
  {{- else if and .Values.config.basicAuth.enabled (eq .Values.config.authType "mixed") }}
  VITE_BACKEND_AUTH_TYPE: "mixed"
  AUTH_TYPE: "mixed"
  BASIC_AUTH_ENABLED: "true"
  VITE_BASIC_AUTH_ENABLED: "true"
  INITIAL_ORG_NAME: {{ .Values.config.initialOrgName }}
  DEFAULT_WORKSPACE_NAME: {{ .Values.config.defaultWorkspaceName }}
  {{- else }}
  VITE_BACKEND_AUTH_TYPE: "none"
  AUTH_TYPE: "none"
  {{- end }}
  LANGCHAIN_ENV: "local_kubernetes"
  LANGCHAIN_ENDPOINT: "/{{ if .Values.config.basePath }}{{ .Values.config.basePath }}/{{ end }}api/v1"
  GO_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{ .Values.platformBackend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.platformBackend.service.port }}"
  GO_ACE_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{.Values.aceBackend.name}}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.aceBackend.service.port }}"
  PLAYGROUND_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{.Values.playground.name}}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.playground.service.port }}"
  SMITH_BACKEND_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{.Values.backend.name}}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.backend.service.port }}"
  HOST_BACKEND_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{.Values.hostBackend.name}}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.hostBackend.service.port }}"
  LANGSMITH_AUTH_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{ .Values.platformBackend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.platformBackend.service.port }}"
  {{- if and .Values.smithdb.enabled .Values.smithdb.langsmith.frontend.useSmithDBEndpoints }}
  {{- $smithdbQueryUrl := include "langsmith.smithdb.grpcServiceUrl" (dict "root" . "component" "query" "port" .Values.smithdb.query.service.port) }}
  SMITHDB_QUERY_SERVICE_URL: {{ $smithdbQueryUrl | quote }}
  SMITHDB_MUTATIONS_SERVICE_URL: {{ $smithdbQueryUrl | quote }}
  {{- end }}
  {{- if and .Values.smithdb.enabled .Values.smithdb.langsmith.dualIngest.enabled }}
  SMITHDB_INGESTION_SERVICE_URL: {{ include "langsmith.smithdb.grpcServiceUrl" (dict "root" . "component" "ingestion" "port" .Values.smithdb.ingestion.service.port) | quote }}
  SMITHDB_INGEST_ORGS_ROLLOUT_PCT: "100"
  {{- end }}
  {{- if .Values.smithdb.enabled }}
  SMITHDB_CLUSTER_MANAGER_ENABLED: "true"
  SMITHDB_CLUSTER_MANAGER_URL: {{ include "langsmith.smithdb.grpcServiceUrl" (dict "root" . "component" "clusterManager" "port" .Values.smithdb.clusterManager.service.port) | quote }}
  {{- end }}
  {{- if .Values.config.hostname }}
  # Remote MCP server / OAuth Authorization Server (served under /api). The AS only
  # activates when a signing JWKS is present (langsmith_signing_jwks in the secret);
  # without it these are inert. Routes are added in the frontend nginx config.
  OAUTH_AS_ENABLED: "true"
  OAUTH_AS_ISSUER: {{ include "langsmith.oauthAsIssuer" . | quote }}
  {{- end }}
  {{- if .Values.config.llmAuthProxyIssuer }}
  LLM_AUTH_PROXY_ISSUER: {{ .Values.config.llmAuthProxyIssuer | quote }}
  {{- end }}
  {{- if and .Values.fleet.enabled .Values.fleetTriggerServer.enabled }}
  MCP_SERVER_URL: "http://{{ include "langsmith.fullname" . }}-{{ .Values.fleetToolServer.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.fleetToolServer.service.port }}"
  {{- end }}
  {{- if .Values.config.deployment.enabled }}
  {{- if not .Values.frontend.enabled }}
  HOST_LANGCHAIN_API_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{ .Values.backend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.backend.service.port }}/api/v1"
  {{- else }}
  {{- if .Values.config.basePath }}
  HOST_LANGCHAIN_API_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.frontend.service.httpPort }}/{{ .Values.config.basePath}}/api/v1"
  {{- else }}
  HOST_LANGCHAIN_API_ENDPOINT: "http://{{ include "langsmith.fullname" . }}-{{ .Values.frontend.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.frontend.service.httpPort }}/api/v1"
  {{- end }}
  {{- end }}
  {{- end }}
  FF_RUN_STATS_GROUP_BY_ENABLED_ALL: "true"
  SEPARATE_QUEUES_WITH_SINGLE_WORKER: '["host"]'
  {{- if .Values.config.observability.tracing.enabled }}
  OTEL_TRACING_ENABLED: "{{ .Values.config.observability.tracing.enabled }}"
  OTLP_ENDPOINT: "{{ .Values.config.observability.tracing.endpoint }}"
  OTEL_ENVIRONMENT: "{{ .Values.config.observability.tracing.env }}"
  OTEL_EXPORTER: "{{ .Values.config.observability.tracing.exporter }}"
  OTEL_USE_TLS: "{{ .Values.config.observability.tracing.useTls }}"
  {{- else }}
  OTEL_TRACING_ENABLED: "false"
  OTLP_ENDPOINT: ""
  {{- end }}
  # Self-hosted telemetry
  ENABLE_POSTGRES_METRICS_CRON: {{ ternary "true" "false" .Values.config.telemetry.metrics | quote }}
  ENABLE_REDIS_METRICS_CRON: {{ ternary "true" "false" .Values.config.telemetry.metrics | quote }}
  ENABLE_CLICKHOUSE_METRICS_CRON: {{ ternary "true" "false" .Values.config.telemetry.metrics | quote }}
  BEACON_LOGGING_ENABLED: {{ ternary "true" "false" .Values.config.telemetry.logs | quote }}
  BEACON_METRICS_ENABLED: {{ ternary "true" "false" .Values.config.telemetry.metrics | quote }}
  BEACON_TRACING_ENABLED: {{ ternary "true" "false" .Values.config.telemetry.traces | quote }}
  # Feedback from postgres
  FEEDBACK_CONFIG_SKIP_INGEST_CH_WRITE: "true"
  FF_USE_PG_FOR_FEEDBACK_CONFIGS_FETCH_ENABLED_ALL: "true"
  FF_USE_PG_FOR_FEEDBACK_FETCH_ENABLED_ALL: "true"
  IS_SELF_HOSTED: "true"
  {{- if .Values.polly.enabled }}
  SELF_HOSTED_POLLY_ENABLED: "true"
  {{- end }}
  {{- if .Values.agentGateway.enabled }}
  AGENT_GATEWAY_URL: "http://{{ include "langsmith.fullname" . }}-{{ .Values.agentGateway.name }}.{{ .Values.namespace | default .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.agentGateway.service.port }}"
  {{- end }}
  # Usage backfill export gating
  {{- if .Values.config.superAdmins }}
  USAGE_EXPORT_ADMIN_EMAILS: {{ .Values.config.superAdmins | toJson | quote }}
  {{- end }}
  ORG_ADMINS_INSTALLATION_USAGE_EXPORT_ENABLED: {{ .Values.config.orgAdminsInstallationUsageExportEnabled | quote }}
  # Security - CORS configuration
  {{- if .Values.config.security.cors.allowedOriginsRegex }}
  CORS_ALLOWED_ORIGINS_REGEX: {{ .Values.config.security.cors.allowedOriginsRegex | quote }}
  {{- else }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.security.cors.allowedOrigins | quote }}
  {{- end }}
  {{- if .Values.config.security.cors.alwaysAllowPathsRegex }}
  CORS_ALWAYS_ALLOW_PATHS_REGEX: {{ .Values.config.security.cors.alwaysAllowPathsRegex | quote }}
  {{- end }}
