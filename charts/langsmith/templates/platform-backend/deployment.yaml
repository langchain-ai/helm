{{- define "platformBackendEnvVars" -}}
- name: PORT
  value: {{ .Values.platformBackend.containerPort | quote }}
{{- with .Values.config.basePath }}
- name: DOCS_PREFIX
  value: /{{ . }}/api
{{- end }}
# OAuth AS / remote MCP (and LLM-auth-proxy) signing key. Always wired (optional) from
# the chart secret, so don't set LANGSMITH_SIGNING_JWKS manually — it trips detectDuplicates.
- name: LANGSMITH_SIGNING_JWKS
  valueFrom:
    secretKeyRef:
      name: {{ include "langsmith.secretsName" . }}
      key: langsmith_signing_jwks
      optional: true
{{- if .Values.config.sandboxes.enabled }}
- name: SANDBOX_FEATURE_ENABLED
  value: "true"
- name: SANDBOX_FRONTEND_ENABLED
  value: "true"
- name: SANDBOX_RUNTIME_V2
  value: "always"
- name: SANDBOX_K8S_CLUSTER_NAME
  value: {{ .Values.config.sandboxes.clusterName | quote }}
- name: SANDBOX_MAX_CPU_CORES
  value: {{ .Values.config.sandboxes.limits.maxCpuCores | quote }}
- name: SANDBOX_MAX_MEMORY_GB
  value: {{ .Values.config.sandboxes.limits.maxMemoryGb | quote }}
- name: SANDBOX_MIN_EPHEMERAL_STORAGE_GB
  value: {{ .Values.config.sandboxes.limits.minEphemeralStorageGb | quote }}
- name: SANDBOX_MAX_EPHEMERAL_STORAGE_GIB
  value: {{ .Values.config.sandboxes.limits.maxEphemeralStorageGb | quote }}
- name: SANDBOX_MAX_SANDBOXES
  value: {{ .Values.config.sandboxes.limits.maxSandboxes | quote }}
{{- if .Values.config.sandboxes.serviceUrlBaseUrl }}
- name: SANDBOX_SERVICE_URLS
  value: {{ dict .Values.config.sandboxes.clusterName .Values.config.sandboxes.serviceUrlBaseUrl | toJson | quote }}
{{- end }}
- name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ include "langsmith.secretsName" . }}
      key: sandbox_x_service_auth_jwt_secret
      optional: {{ .Values.config.disableSecretCreation }}
{{- if or (not (empty .Values.config.existingSecretName)) .Values.config.sandboxes.xServiceAuthJwtSecretPrevious }}
- name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET_PREVIOUS
  valueFrom:
    secretKeyRef:
      name: {{ include "langsmith.secretsName" . }}
      key: sandbox_x_service_auth_jwt_secret_previous
      optional: {{ or .Values.config.disableSecretCreation (not (empty .Values.config.existingSecretName)) }}
{{- end }}
{{- if or (not (empty .Values.config.existingSecretName)) .Values.config.sandboxes.callbackSigningJwk }}
- name: LANGSMITH_SANDBOX_CALLBACK_SIGNING_JWK
  valueFrom:
    secretKeyRef:
      name: {{ include "langsmith.secretsName" . }}
      key: sandbox_callback_signing_jwk
      optional: true
{{- end }}
{{- end }}
{{- end -}}
{{- $envVars := concat .Values.commonEnv (include "langsmith.commonEnv" . | fromYamlArray) (include "platformBackendEnvVars" . | fromYamlArray) .Values.platformBackend.deployment.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
{{- $volumes := concat .Values.commonVolumes .Values.platformBackend.deployment.volumes (include "langsmith.tlsVolumes" . | fromYamlArray) -}}
{{- $volumeMounts := concat .Values.commonVolumeMounts .Values.platformBackend.deployment.volumeMounts (include "langsmith.tlsVolumeMounts" . | fromYamlArray) -}}
{{- if .Values.platformBackend.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.platformBackend.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with.Values.platformBackend.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with.Values.platformBackend.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not (or .Values.platformBackend.autoscaling.hpa.enabled .Values.platformBackend.autoscaling.keda.enabled) }}
  replicas: {{ .Values.platformBackend.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.platformBackend.name }}
  template:
    metadata:
      annotations:
      {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
      {{- include "langsmith.checksumAnnotations" . | nindent 8 }}
      {{- with .Values.platformBackend.deployment.annotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with.Values.platformBackend.deployment.labels }}
            {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.fullname" . }}-{{ .Values.platformBackend.name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.platformBackend.deployment.terminationGracePeriodSeconds }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "langsmith.podSecurityContext" (dict "Values" .Values "componentSecurityContext" .Values.platformBackend.deployment.podSecurityContext) | nindent 8 }}
      serviceAccountName: {{ include "platformBackend.serviceAccountName" . }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with concat .Values.commonInitContainers .Values.platformBackend.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.platformBackend.name }}
          {{- with.Values.platformBackend.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- with $envVars }}
              {{ toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "langsmith.fullname" . }}-config
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "platformBackendImage") | quote }}
          imagePullPolicy: {{ .Values.images.platformBackendImage.pullPolicy }}
          ports:
            - name: platform
              containerPort: {{ .Values.platformBackend.containerPort }}
              protocol: TCP
          {{- with .Values.platformBackend.deployment.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.platformBackend.deployment.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.platformBackend.deployment.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.platformBackend.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.platformBackend.deployment.securityContext | nindent 12 }}
          {{- with .Values.platformBackend.deployment.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $volumeMounts }}
          volumeMounts:
              {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.platformBackend.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.platformBackend.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.platformBackend.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platformBackend.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platformBackend.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platformBackend.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.platformBackend.rollout.enabled }}
  strategy:
    {{- toYaml .Values.platformBackend.rollout.strategy | nindent 4 }}
{{- end }}
