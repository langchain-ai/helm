{{- if .Values.smithdb.enabled }}
{{- range $component := list "query" "ingestion" "compaction" "client" "clusterManager" "metastoreMigration" }}
{{- $componentValues := index $.Values.smithdb $component }}
{{- if and $componentValues.enabled $componentValues.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" $ "component" $component) }}
  namespace: {{ $.Values.namespace | default $.Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" $ "component" $component) }}
    {{- with $componentValues.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- if eq $component "metastoreMigration" }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- end }}
    {{- include "langsmith.smithdb.annotations" $ | nindent 4 }}
    {{- with $componentValues.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ $componentValues.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}
