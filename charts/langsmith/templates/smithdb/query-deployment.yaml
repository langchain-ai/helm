{{- if and .Values.smithdb.enabled .Values.smithdb.query.enabled }}
{{- $clusterManagerEnv := list -}}
{{- if .Values.smithdb.clusterManager.enabled }}
{{- $clusterManagerEnv = (include "langsmith.smithdb.clusterManagerClientEnv" (dict "root" . "service" "QUERY") | fromYamlArray) -}}
{{- end }}
{{- $envVars := concat (include "langsmith.smithdb.serviceEnv" (dict "root" . "service" "QUERY" "displayName" "smithdb-query") | fromYamlArray) $clusterManagerEnv .Values.smithdb.query.deployment.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "query") }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "query") }}
    {{- with .Values.smithdb.query.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.smithdb.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.query.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.smithdb.query.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "query") }}
  template:
    metadata:
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.smithdb.query.deployment.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "langsmith.smithdb.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "query") }}
        {{- with .Values.smithdb.query.deployment.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.smithdb.query.deployment.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" . "component" "query") }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with .Values.smithdb.query.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.smithdb.query.name }}
          {{- with .Values.smithdb.query.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- toYaml $envVars | nindent 12 }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithdbQueryImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithdbQueryImage.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.smithdb.query.containerPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.smithdb.query.containerGrpcPort }}
              protocol: TCP
          {{- include "langsmith.smithdb.httpProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.smithdb.query.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.smithdb.query.deployment.securityContext | nindent 12 }}
          {{- with .Values.smithdb.query.deployment.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.smithdb.query.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.smithdb.query.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.smithdb.query.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.query.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.query.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.query.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.query.deployment.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
