{{- if and .Values.smithdb.enabled .Values.smithdb.client.enabled }}
{{- $queryUrl := include "langsmith.smithdb.httpServiceUrl" (dict "root" . "component" "query" "port" .Values.smithdb.query.service.port) -}}
{{- $ingestionUrl := include "langsmith.smithdb.httpServiceUrl" (dict "root" . "component" "ingestion" "port" .Values.smithdb.ingestion.service.port) -}}
{{- $clientArgs := list
  "--query-url" $queryUrl
  "--ingest-url" $ingestionUrl
  "--metrics-port" (.Values.smithdb.client.containerPort | toString)
-}}
{{- if and .Values.smithdb.client.useClusterManager .Values.smithdb.clusterManager.enabled }}
{{- $clientArgs = concat $clientArgs (list "--clustermanager-url" (include "langsmith.smithdb.clusterManagerHttpEndpoint" .)) -}}
{{- end }}
{{- $clientArgs = concat $clientArgs (list
  "mixed"
) -}}
{{- with .Values.smithdb.client.tenantId }}
{{- $clientArgs = concat $clientArgs (list "--tenant-id" (. | toString)) -}}
{{- end }}
{{- with .Values.smithdb.client.sessionId }}
{{- $clientArgs = concat $clientArgs (list "--session-id" (. | toString)) -}}
{{- end }}
{{- $clientArgs = concat $clientArgs (list
  "--query-rate" (.Values.smithdb.client.queryQps | toString)
  "--ingest-rate" (.Values.smithdb.client.ingestionQps | toString)
  "--batch-size" (.Values.smithdb.client.batchSize | toString)
  "--max-concurrent" (.Values.smithdb.client.maxConcurrent | toString)
  "--report-every" (.Values.smithdb.client.reportEvery | toString)
  "--rows-per-tick" (.Values.smithdb.client.workload.rowsPerTick | toString)
  "--num-active-threads" (.Values.smithdb.client.workload.numActiveThreads | toString)
  "--traces-per-thread" (.Values.smithdb.client.workload.tracesPerThread | toString)
) -}}
{{- if .Values.smithdb.client.duration }}
{{- $clientArgs = concat $clientArgs (list "--duration" (.Values.smithdb.client.duration | toString)) -}}
{{- end }}
{{- if .Values.smithdb.client.multitenant }}
{{- $clientArgs = concat $clientArgs (list "--multitenant" "--num-tenants" (.Values.smithdb.client.numTenants | toString)) -}}
{{- end }}
{{- $clientArgs = concat $clientArgs .Values.smithdb.client.deployment.extraArgs .Values.smithdb.client.queries -}}
{{- include "langsmith.detectDuplicates" .Values.smithdb.client.deployment.extraEnv -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "client") }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "client") }}
    {{- with .Values.smithdb.client.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.smithdb.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.client.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.smithdb.client.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "client") }}
  template:
    metadata:
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.smithdb.client.deployment.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "langsmith.smithdb.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "client") }}
        {{- with .Values.smithdb.client.deployment.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.smithdb.client.deployment.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" . "component" "client") }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with .Values.smithdb.client.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.smithdb.client.name }}
          {{- with .Values.smithdb.client.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- toYaml $clientArgs | nindent 12 }}
          {{- with .Values.smithdb.client.deployment.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithdbClientImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithdbClientImage.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.smithdb.client.containerPort }}
              protocol: TCP
          {{- include "langsmith.smithdb.httpProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.smithdb.client.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.smithdb.client.deployment.securityContext | nindent 12 }}
          {{- with .Values.smithdb.client.deployment.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.smithdb.client.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.smithdb.client.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.smithdb.client.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.client.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.client.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.client.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.client.deployment.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
