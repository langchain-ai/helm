{{- if and .Values.smithdb.enabled .Values.smithdb.compactionWorker.enabled }}
{{- $workerEnv := list
  (dict "name" "SMITHDB_COMPACTION_WORKER__HTTP_PORT" "value" (.Values.smithdb.compactionWorker.containerPort | toString))
  (dict "name" "SMITHDB_COMPACTION_WORKER__GRPC_ENDPOINT" "value" (include "langsmith.smithdb.httpServiceUrl" (dict "root" . "component" "compaction" "port" .Values.smithdb.compaction.service.port)))
  (dict "name" "SMITHDB_COMPACTION_WORKER__GRPC_REQUEST_TIMEOUT" "value" "30s")
-}}
{{- with .Values.smithdb.compactionWorker.maxConcurrentJobs }}
{{- $workerEnv = append $workerEnv (dict "name" "SMITHDB_COMPACTION_WORKER__MAX_CONCURRENT_JOBS" "value" (. | toString)) -}}
{{- end }}
{{- $envVars := concat (include "langsmith.smithdb.serviceEnv" (dict "root" . "service" "COMPACTION_WORKER" "displayName" "smithdb-compaction-worker") | fromYamlArray) $workerEnv .Values.smithdb.compactionWorker.deployment.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "compactionWorker") }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "compactionWorker") }}
    {{- with .Values.smithdb.compactionWorker.deployment.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.smithdb.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.compactionWorker.deployment.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.smithdb.compactionWorker.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "langsmith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "compactionWorker") }}
  template:
    metadata:
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.smithdb.compactionWorker.deployment.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "langsmith.smithdb.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "compactionWorker") }}
        {{- with .Values.smithdb.compactionWorker.deployment.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.smithdb.compactionWorker.deployment.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" . "component" "compaction") }}
      terminationGracePeriodSeconds: {{ .Values.smithdb.compactionWorker.deployment.terminationGracePeriodSeconds }}
      {{- include "langsmith.dnsConfig" . | nindent 6 }}
      {{- with .Values.smithdb.compactionWorker.deployment.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.smithdb.compactionWorker.name }}
          {{- with .Values.smithdb.compactionWorker.deployment.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- toYaml $envVars | nindent 12 }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithdbCompactionImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithdbCompactionImage.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.smithdb.compactionWorker.containerPort }}
              protocol: TCP
          {{- include "langsmith.smithdb.httpProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.smithdb.compactionWorker.deployment.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.smithdb.compactionWorker.deployment.securityContext | nindent 12 }}
          {{- with .Values.smithdb.compactionWorker.deployment.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.smithdb.compactionWorker.deployment.extraContainerConfig }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.smithdb.compactionWorker.deployment.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.smithdb.compactionWorker.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.compactionWorker.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.compactionWorker.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.compactionWorker.deployment.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.compactionWorker.deployment.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
