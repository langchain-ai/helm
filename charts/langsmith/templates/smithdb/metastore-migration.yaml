{{- if .Values.smithdb.enabled }}
{{- $cfg := .Values.smithdb.config -}}
{{- $secret := $cfg.existingSecretName -}}
{{- $envVars := list
  (dict "name" "DATABASE_HOST" "valueFrom" (dict "secretKeyRef" (dict "name" $secret "key" $cfg.metastore.hostSecretKey)))
  (dict "name" "DATABASE_PORT" "value" ($cfg.metastore.port | toString))
  (dict "name" "DATABASE_NAME" "valueFrom" (dict "secretKeyRef" (dict "name" $secret "key" $cfg.metastore.databaseSecretKey)))
  (dict "name" "DATABASE_USERNAME" "valueFrom" (dict "secretKeyRef" (dict "name" $secret "key" $cfg.metastore.usernameSecretKey)))
  (dict "name" "DATABASE_PASSWORD" "valueFrom" (dict "secretKeyRef" (dict "name" $secret "key" $cfg.metastore.passwordSecretKey)))
  (dict "name" "DATABASE_USE_SSL" "value" (.Values.smithdb.metastoreMigration.useSsl | toString))
-}}
{{- $envVars = concat $envVars .Values.smithdb.metastoreMigration.job.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
    {{- with .Values.smithdb.metastoreMigration.job.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.metastoreMigration.job.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.smithdb.metastoreMigration.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.smithdb.metastoreMigration.job.ttlSecondsAfterFinished }}
  {{- with .Values.smithdb.metastoreMigration.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "langsmith.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
        {{- with .Values.smithdb.metastoreMigration.job.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.smithdb.metastoreMigration.job.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: {{ .Values.smithdb.metastoreMigration.job.restartPolicy }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.smithdb.metastoreMigration.job.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" . "component" "metastoreMigration") }}
      containers:
        - name: {{ .Values.smithdb.metastoreMigration.name }}
          {{- with .Values.smithdb.metastoreMigration.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- toYaml $envVars | nindent 12 }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithdbImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithdbImage.pullPolicy }}
          resources:
            {{- toYaml .Values.smithdb.metastoreMigration.job.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.smithdb.metastoreMigration.job.securityContext | nindent 12 }}
      {{- with .Values.smithdb.metastoreMigration.job.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.metastoreMigration.job.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.metastoreMigration.job.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
