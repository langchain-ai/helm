{{- if and .Values.smithdb.enabled .Values.smithdb.metastoreMigration.enabled }}
{{- $envVars := concat (include "langsmith.smithdb.metastoreMigrationEnv" . | fromYamlArray) .Values.smithdb.metastoreMigration.job.extraEnv -}}
{{- include "langsmith.detectDuplicates" $envVars -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
    {{- with .Values.smithdb.metastoreMigration.job.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- include "langsmith.smithdb.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.metastoreMigration.job.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.smithdb.metastoreMigration.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.smithdb.metastoreMigration.job.ttlSecondsAfterFinished }}
  {{- with .Values.smithdb.metastoreMigration.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "langsmith.smithdb.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "langsmith.smithdb.componentName" (dict "root" . "component" "metastoreMigration") }}
        {{- with .Values.smithdb.metastoreMigration.job.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.smithdb.metastoreMigration.job.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: {{ .Values.smithdb.metastoreMigration.job.restartPolicy }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.smithdb.metastoreMigration.job.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" . "component" "metastoreMigration") }}
      containers:
        - name: {{ .Values.smithdb.metastoreMigration.name }}
          command:
            - "/bin/sh"
            - "-ec"
          args:
            - |
              required_vars="DATABASE_HOST DATABASE_PORT DATABASE_USERNAME DATABASE_PASSWORD DATABASE_NAME"
              for var_name in ${required_vars}; do
                var_value="$(printenv "${var_name}" || true)"
                if [ -z "${var_value}" ]; then
                  echo "Missing required env var: ${var_name}" >&2
                  exit 1
                fi

                cleaned_value="$(printf '%s' "${var_value}" | tr -d '\n')"
                if [ "${cleaned_value}" != "${var_value}" ]; then
                  echo "Invalid value for ${var_name}: newlines are not supported" >&2
                  exit 1
                fi
              done

              use_tls="false"
              if [ "${DATABASE_USE_SSL}" = "true" ]; then
                use_tls="true"
              fi

              toml_escape() {
                printf '%s' "$1" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g'
              }

              umask 077
              tmp_config="$(mktemp)"
              cleanup() {
                rm -f "${tmp_config}"
              }
              trap cleanup EXIT

              {
                printf '%s\n' '[main]'
                printf 'db_type = "%s"\n' 'Postgres'
                printf 'db_host = "%s"\n' "$(toml_escape "${DATABASE_HOST}")"
                printf 'db_port = "%s"\n' "$(toml_escape "${DATABASE_PORT}")"
                printf 'db_user = "%s"\n' "$(toml_escape "${DATABASE_USERNAME}")"
                printf 'db_pass = "%s"\n' "$(toml_escape "${DATABASE_PASSWORD}")"
                printf 'db_name = "%s"\n' "$(toml_escape "${DATABASE_NAME}")"
                printf 'use_tls = %s\n' "${use_tls}"
              } > "${tmp_config}"

              refinery migrate -c "${tmp_config}" -p /app/migrations/metastore
          env:
            {{- toYaml $envVars | nindent 12 }}
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithdbMetastoreMigrationImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithdbMetastoreMigrationImage.pullPolicy }}
          resources:
            {{- toYaml .Values.smithdb.metastoreMigration.job.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.smithdb.metastoreMigration.job.securityContext | nindent 12 }}
      {{- with .Values.smithdb.metastoreMigration.job.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.metastoreMigration.job.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.smithdb.metastoreMigration.job.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
