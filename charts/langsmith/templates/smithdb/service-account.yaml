{{- if and .Values.smithdb.enabled .Values.smithdb.serviceAccount.create }}
{{- /* Render before the metastore-migration hook. */ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "langsmith.smithdb.serviceAccountName" (dict "root" .) }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.smithdb.labels" . | nindent 4 }}
    {{- with .Values.smithdb.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.smithdb.annotations" . | nindent 4 }}
    {{- with .Values.smithdb.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.smithdb.serviceAccount.automountServiceAccountToken }}
{{- end }}
