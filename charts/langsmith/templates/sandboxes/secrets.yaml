{{- if and .Values.config.sandboxes.enabled .Values.config.sandboxes.runtimeSecret.create (not .Values.config.sandboxes.runtimeSecret.existingSecretName) }}
{{- $namespace := .Values.namespace | default .Release.Namespace }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langsmith.sandboxes.runtimeSecretName" . }}
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.sandboxes.runtimeSecret.xServiceAuthJwtSecretKey }}: {{ include "langsmith.sandboxes.xServiceAuthJwtSecretValue" . | quote }}
  {{- if .Values.config.sandboxes.xServiceAuthJwtSecretPrevious }}
  {{ .Values.config.sandboxes.runtimeSecret.xServiceAuthJwtSecretPreviousKey }}: {{ .Values.config.sandboxes.xServiceAuthJwtSecretPrevious | quote }}
  {{- end }}
  {{- if .Values.config.sandboxes.callbackSigningJwk }}
  {{ .Values.config.sandboxes.runtimeSecret.callbackSigningJwkKey }}: {{ .Values.config.sandboxes.callbackSigningJwk | quote }}
  {{- end }}
{{- end }}
