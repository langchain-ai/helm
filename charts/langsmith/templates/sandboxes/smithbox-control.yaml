{{- if and .Values.config.sandboxes.enabled .Values.config.sandboxes.smithboxControl.enabled }}
{{- $namespace := include "langsmith.sandboxes.namespace" . }}
{{- if .Values.config.sandboxes.smithboxControl.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "langsmith.sandboxes.smithboxControlServiceAccountName" . }}
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.config.sandboxes.smithboxControl.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.config.sandboxes.smithboxControl.serviceAccount.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.config.sandboxes.smithboxControl.serviceAccount.automountServiceAccountToken }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smithbox-control-pod-read
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smithbox-control-pod-read
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "langsmith.sandboxes.smithboxControlServiceAccountName" . }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smithbox-control-pod-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-smithbox-control-auth-delegator" (include "langsmith.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "langsmith.sandboxes.smithboxControlServiceAccountName" . }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.config.sandboxes.smithboxControl.name }}
  namespace: {{ $namespace }}
  labels:
    app: smithbox-control
    {{- include "langsmith.labels" . | nindent 4 }}
    {{- with .Values.config.sandboxes.smithboxControl.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "langsmith.annotations" . | nindent 4 }}
    {{- with .Values.config.sandboxes.smithboxControl.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.config.sandboxes.smithboxControl.replicas }}
  selector:
    matchLabels:
      app: smithbox-control
  template:
    metadata:
      labels:
        app: smithbox-control
        {{- include "langsmith.labels" . | nindent 8 }}
      annotations:
        {{- include "langsmith.commonPodAnnotations" . | nindent 8 }}
        {{- with .Values.config.sandboxes.smithboxControl.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "langsmith.sandboxes.smithboxControlServiceAccountName" . }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.config.sandboxes.smithboxControl.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.config.sandboxes.smithboxControl.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: smithbox-control
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "smithboxControlImage") | quote }}
          imagePullPolicy: {{ .Values.images.smithboxControlImage.pullPolicy }}
          args:
            - --listen=:{{ .Values.config.sandboxes.smithboxControl.containerPort }}
            - --mount={{ .Values.config.sandboxes.juicefs.csi.mountPath }}
          env:
            - name: LANGCHAIN_ENV
              value: {{ .Values.config.sandboxes.langchainEnv | quote }}
            - name: SANDBOX_CONTROL_RUNTIME_LIFECYCLE_RECONCILER_ENABLED
              value: {{ .Values.config.sandboxes.smithboxControl.runtimeLifecycleReconcilerEnabled | quote }}
            - name: SANDBOX_CONTROL_HOST_OBSERVER_ENABLED
              value: {{ .Values.config.sandboxes.smithboxControl.hostObserverEnabled | quote }}
            - name: LANGSMITH_SANDBOX_INTERNAL_ENDPOINT
              value: {{ include "langsmith.sandboxes.langsmithInternalEndpoint" . | quote }}
            - name: X_SERVICE_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.sandboxes.runtimeSecretName" . }}
                  key: {{ .Values.config.sandboxes.runtimeSecret.xServiceAuthJwtSecretKey }}
            {{- if .Values.config.sandboxes.xServiceAuthJwtSecretPrevious }}
            - name: X_SERVICE_AUTH_JWT_SECRET_PREVIOUS
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.sandboxes.runtimeSecretName" . }}
                  key: {{ .Values.config.sandboxes.runtimeSecret.xServiceAuthJwtSecretPreviousKey }}
                  optional: true
            {{- end }}
            {{- if .Values.redis.external.cluster.enabled }}
            - name: SMITHBOX_REDIS_ADDR
              value: {{ first .Values.redis.external.cluster.nodeUris | quote }}
            - name: SMITHBOX_REDIS_CLUSTER_ADDRS
              value: {{ join "," .Values.redis.external.cluster.nodeUris | quote }}
            {{- else }}
            - name: SMITHBOX_REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.sandboxes.smithboxControlRedisSecretName" . }}
                  key: {{ include "langsmith.sandboxes.smithboxControlRedisConnectionUrlSecretKey" . }}
                  optional: false
            {{- end }}
            - name: SMITHBOX_REDIS_IAM_AUTH_PROVIDER
              value: {{ default .Values.redis.external.iamAuthProvider .Values.config.sandboxes.smithboxControl.redisIamAuthProvider | quote }}
            - name: SMITHBOX_REDIS_CLUSTER_ENABLED
              value: {{ or .Values.config.sandboxes.smithboxControl.redisClusterEnabled .Values.redis.external.cluster.enabled | quote }}
            - name: SMITHBOX_REDIS_DISABLE_CLIENT_SETINFO
              value: {{ .Values.config.sandboxes.smithboxControl.redisDisableClientSetinfo | quote }}
            - name: SMITHBOX_FIRECRACKER_SIZE_CLASSES
              value: {{ .Values.config.sandboxes.firecrackerSizeClasses | toJson | quote }}
          ports:
            - containerPort: {{ .Values.config.sandboxes.smithboxControl.containerPort }}
              name: http
              protocol: TCP
          securityContext:
            privileged: true
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.config.sandboxes.smithboxControl.containerPort }}
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.config.sandboxes.smithboxControl.resources | nindent 12 }}
          volumeMounts:
            - name: juicefs-csi
              mountPath: {{ .Values.config.sandboxes.juicefs.csi.mountPath }}
              mountPropagation: HostToContainer
      volumes:
        - name: juicefs-csi
          persistentVolumeClaim:
            claimName: {{ .Values.config.sandboxes.juicefs.csi.pvcName }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.sandboxes.smithboxControl.name }}
  namespace: {{ $namespace }}
  labels:
    app: smithbox-control
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: smithbox-control
  ports:
    - port: {{ .Values.config.sandboxes.smithboxControl.containerPort }}
      targetPort: {{ .Values.config.sandboxes.smithboxControl.containerPort }}
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smithbox-control-ingress
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: smithbox-control
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.config.sandboxes.smithboxControl.containerPort }}
{{- end }}
