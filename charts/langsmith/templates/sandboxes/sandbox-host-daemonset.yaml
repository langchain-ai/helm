{{- if and .Values.config.sandboxes.enabled .Values.config.sandboxes.sandboxHost.enabled }}
{{- $namespace := include "langsmith.sandboxes.namespace" . }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.config.sandboxes.sandboxHost.name }}
  namespace: {{ $namespace }}
  labels:
    app: sandbox-host
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: sandbox-host
  updateStrategy:
    type: OnDelete
  template:
    metadata:
      labels:
        app: sandbox-host
        {{- include "langsmith.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "langsmith.sandboxes.sandboxHostServiceAccountName" . }}
      {{- with .Values.images.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.config.sandboxes.sandboxHost.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.config.sandboxes.sandboxHost.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sandbox-host
          image: {{ include "langsmith.image" (dict "Values" .Values "Chart" .Chart "component" "sandboxHostImage") | quote }}
          imagePullPolicy: {{ .Values.images.sandboxHostImage.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -x /host-bin/sandbox-host ]; then
                cp /opt/sandbox-host/bin/sandbox-host /host-bin/sandbox-host.tmp
                mv /host-bin/sandbox-host.tmp /host-bin/sandbox-host
              fi
              exec /host-bin/sandbox-host
          env:
            - name: LANGCHAIN_ENV
              value: {{ .Values.config.sandboxes.langchainEnv | quote }}
            - name: SANDBOX_HOST_BIN_DIR
              value: /opt/sandbox-host/bin
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SANDBOX_X_SERVICE_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.sandboxes.runtimeSecretName" . }}
                  key: {{ .Values.config.sandboxes.runtimeSecret.xServiceAuthJwtSecretKey }}
            - name: SANDBOX_HOST_PROXY_CA_DIR
              value: /certs
            {{- if .Values.config.sandboxes.callbackSigningJwk }}
            - name: LANGSMITH_SANDBOX_CALLBACK_SIGNING_JWK
              valueFrom:
                secretKeyRef:
                  name: {{ include "langsmith.sandboxes.runtimeSecretName" . }}
                  key: {{ .Values.config.sandboxes.runtimeSecret.callbackSigningJwkKey }}
                  optional: true
            {{- end }}
            - name: OAUTH_AS_ISSUER
              value: {{ include "langsmith.sandboxes.langsmithInternalEndpoint" . | quote }}
            - name: SSRF_ALLOW_PRIVATE_IPS_CALLBACKS
              value: "true"
            - name: SANDBOX_CALLBACK_LOOPBACK_REWRITE
              value: "false"
            - name: LANGSMITH_SANDBOX_INTERNAL_ENDPOINT
              value: {{ include "langsmith.sandboxes.langsmithInternalEndpoint" . | quote }}
            - name: SANDBOX_HOST_TERMINATION_GRACE_SECONDS
              value: {{ .Values.config.sandboxes.sandboxHost.terminationGracePeriodSeconds | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.config.sandboxes.sandboxHost.containerPort }}
              hostPort: {{ .Values.config.sandboxes.sandboxHost.containerPort }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.config.sandboxes.sandboxHost.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.config.sandboxes.sandboxHost.resources | nindent 12 }}
          volumeMounts:
            - name: juicefs
              mountPath: {{ .Values.config.sandboxes.juicefs.csi.mountPath }}
            - name: host-bin
              mountPath: /host-bin
            - name: proxy-ca
              mountPath: /certs
              readOnly: true
      volumes:
        - name: juicefs
          persistentVolumeClaim:
            claimName: {{ default .Values.config.sandboxes.juicefs.csi.pvcName .Values.config.sandboxes.juicefs.csi.hostPVCName }}
        - name: proxy-ca
          secret:
            secretName: {{ include "langsmith.sandboxes.proxyCASecretName" . }}
        - name: host-bin
          hostPath:
            path: /var/lib/sandbox-host
            type: DirectoryOrCreate
      terminationGracePeriodSeconds: {{ .Values.config.sandboxes.sandboxHost.terminationGracePeriodSeconds }}
{{- end }}
