{{- if and .Values.config.sandboxes.enabled (eq .Values.config.sandboxes.proxyCa.mode "generatedSecret") }}
{{- $name := include "langsmith.sandboxes.proxyCaSecretName" . -}}
{{- $namespace := .Values.namespace | default .Release.Namespace -}}
{{- $existing := lookup "v1" "Secret" $namespace $name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    {{- include "langsmith.annotations" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if $existing }}
  tls.crt: {{ index $existing.data "tls.crt" | quote }}
  tls.key: {{ index $existing.data "tls.key" | quote }}
  {{- else }}
  {{- $ca := genCA "smithbox-proxy-ca" 3650 }}
  tls.crt: {{ $ca.Cert | b64enc | quote }}
  tls.key: {{ $ca.Key | b64enc | quote }}
  {{- end }}
{{- else if and .Values.config.sandboxes.enabled (eq .Values.config.sandboxes.proxyCa.mode "certManager") }}
{{- if .Values.config.sandboxes.proxyCa.certManager.createIssuer }}
apiVersion: cert-manager.io/v1
kind: {{ .Values.config.sandboxes.proxyCa.certManager.issuerKind }}
metadata:
  name: {{ .Values.config.sandboxes.proxyCa.certManager.issuerName }}
  {{- if ne .Values.config.sandboxes.proxyCa.certManager.issuerKind "ClusterIssuer" }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "langsmith.sandboxes.proxyCaSecretName" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: smithbox-proxy-ca
  secretName: {{ include "langsmith.sandboxes.proxyCaSecretName" . }}
  duration: {{ .Values.config.sandboxes.proxyCa.certManager.duration | quote }}
  renewBefore: {{ .Values.config.sandboxes.proxyCa.certManager.renewBefore | quote }}
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: {{ .Values.config.sandboxes.proxyCa.certManager.issuerName }}
    kind: {{ .Values.config.sandboxes.proxyCa.certManager.issuerKind }}
{{- end }}
