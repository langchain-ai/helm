{{- if .Values.config.sandboxes.enabled }}
{{- $namespace := .Values.namespace | default .Release.Namespace }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.sandboxes.sandboxHost.name }}
  namespace: {{ $namespace }}
  labels:
    app: sandbox-host
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: sandbox-host
  ports:
    - name: http
      port: {{ .Values.config.sandboxes.sandboxHost.containerPort }}
      targetPort: {{ .Values.config.sandboxes.sandboxHost.containerPort }}
      protocol: TCP
{{- end }}
