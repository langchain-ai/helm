{{- if and .Values.agentGateway.enabled .Values.agentGateway.autoscaling.enabled .Values.agentGateway.autoscaling.createHpa }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "langsmith.fullname" . }}-{{ .Values.agentGateway.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "langsmith.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "langsmith.fullname" . }}-{{ .Values.agentGateway.name }}
  minReplicas: {{ .Values.agentGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.agentGateway.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.agentGateway.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.agentGateway.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
{{- end }}
