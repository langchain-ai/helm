# Read-Only configuration. Use this if you are running in an environment where containers must run as read-only.
config:
  langsmithLicenseKey: "YOUR_LICENSE_KEY"
  apiKeySalt: "YOUR_API_KEY_SALT"
  authType: "mixed"
  basicAuth:
    enabled: true
    initialOrgAdminEmail: "youremail@corp.dev"
    initialOrgAdminPassword: "TestLangSmith123!"
    jwtSecret: "YOUR_JWT_SECRET"

# Agent applications (fleet, insights, polly) are enabled by default and must
# also be configured for a read-only root filesystem.
fleet:
  enabled: true
  encryptionKey: "YOUR_ENCRYPTION_KEY"
  apiServer:
    deployment:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  queue:
    deployment:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  postgres:
    statefulSet:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: postgres
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: postgres
          mountPath: /run/postgresql
  redis:
    statefulSet:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true

