# Standalone agent features configuration.
# Tests that fleet, insights, and polly come up with their own postgres/redis.
config:
  langsmithLicenseKey: "YOUR_LICENSE_KEY"
  apiKeySalt: "YOUR_API_KEY_SALT"
  authType: "mixed"
  initialOrgAdminEmail: "youremail@corp.dev"
  basicAuth:
    enabled: true
    initialOrgAdminPassword: "TestLangSmith123!"
    jwtSecret: "YOUR_JWT_SECRET"
  deployment:
    enabled: true
  hostname: "test.smith.langchain.dev"

ingress:
  enabled: true

fleet:
  enabled: true
  encryptionKey: "test-fernet-key-for-ci-only-32bytes"
  apiServer:
    deployment:
      resources:
        requests:
          cpu: 100m
          memory: 500Mi
  queue:
    deployment:
      resources:
        requests:
          cpu: 100m
          memory: 500Mi
  postgres:
    statefulSet:
      resources:
        requests:
          cpu: 200m
          memory: 500Mi
  redis:
