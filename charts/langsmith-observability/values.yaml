global:
  envOverrides: []
  langsmithNamespace: romain
  installCRDs: true

observability:
  logs:
    enabled: true
    backend: "local"
    
  metrics:
    enabled: true
    backend: "local"
    kubeStateMetrics:
      enabled: true
    hostMetrics:
      enabled: true
    clickhouse:
      mode: "cluster" # cluster or external
      enabled: true

  traces:
    enabled: false

otelcollector:
  name: langsmith-observability-otel-collector
  image:
    registry: otel/opentelemetry-collector-k8s
    tag: "0.127.0"
  serviceAccount:
    annotations: {}
    labels: {}
  clusterRoleBinding:
    annotations: {}
  clusterRole:
    annotations: {}
    rules: []
  daemonset:
    annotations: {}
  pod:
    annotations: {}

grafana:
  datasources:
    datasources.yaml:
      apiVersion: 1
      # -- Datasources linked to the Grafana instance. Override if you disable any components.
      datasources:
        # https://grafana.com/docs/grafana/latest/datasources/loki/#provision-the-loki-data-source
        - name: Loki
          uid: loki
          type: loki
          url: http://{{ .Release.Name }}-loki-gateway
          isDefault: false
        # https://grafana.com/docs/grafana/latest/datasources/prometheus/#provision-the-data-source
        - name: Mimir
          uid: prom
          type: prometheus
          url: http://{{ .Release.Name }}-mimir-nginx/prometheus
          isDefault: false

logs_backend:
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ingester:
      chunk_encoding: snappy
    querier:
      # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
      max_concurrent: 4
    pattern_ingester:
      enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true

  deploymentMode: Distributed

  # Enable minio for storage locally on cluster
  minio:
    enabled: true

  ingester:
    replicas: 3 # To ensure data durability with replication
    zoneAwareReplication:
      enabled: false
  querier:
    replicas: 3 # Improve query performance via parallelism
    maxUnavailable: 2
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
  queryScheduler:
    replicas: 2
  distributor:
    replicas: 3 
    maxUnavailable: 2
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
    maxUnavailable: 1

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  singleBinary:
    replicas: 0

metrics_backend:
  minio:
    enabled: true

postgresexporter:
  config:
    datasource:
      host: langsmith-postgres.romain.svc.cluster.local
      port: "5432"
      user: postgres
      password: postgres
      database: ''
  serviceAccount:
    name: langsmith-observability-postgres-exporter

redisexporter:
  redisAddress: "redis://langsmith-redis.romain.svc.cluster.local:6379"
  serviceAccount:
    name: langsmith-observability-redis-exporter