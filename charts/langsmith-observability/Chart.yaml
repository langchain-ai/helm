apiVersion: v2
name: langsmith-observability
maintainers:
  - name: Romain
    email: romain@langchain.dev
deprecated: true
description: (DEPRECATED) This chart is deprecated and will be removed in a future version. Please use your own observability stack.
type: application
version: 0.2.0
appVersion: "0.2.0"
dependencies:
  # Prometheus Exporters
  - name: prometheus-postgres-exporter
    version: 6.10.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: postgres-exporter.enabled
    alias: postgres-exporter
  - name: prometheus-redis-exporter
    version: 6.11.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: redis-exporter.enabled
    alias: redis-exporter
  - name: prometheus-nginx-exporter
    version: 1.6.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: nginx-exporter.enabled
    alias: nginx-exporter
  - name: kube-state-metrics
    version: 5.37.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-state-metrics.enabled
    alias: kube-state-metrics
  # LGTM Stack
  - name: grafana
    version: 9.2.6
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: loki
    version: 6.30.1
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: tempo
    version: 1.23.1
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
    alias: tempo