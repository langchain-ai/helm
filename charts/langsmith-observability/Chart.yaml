apiVersion: v2
name: langsmith-observability
maintainers:
  - name: Romain
    email: romain@langchain.dev
description: Helm chart to deploy the observability stack for LangSmith.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: grafana
    version: 9.2.2
    repository: https://grafana.github.io/helm-charts
    condition: observability.grafana.enabled
    alias: grafana
  - name: loki
    version: 6.30.1
    repository: https://grafana.github.io/helm-charts
    condition: observability.logs.local_backend
    alias: logs_backend
  - name: mimir-distributed
    version: 5.7.0
    repository: https://grafana.github.io/helm-charts
    condition: observability.metrics.local_backend
    alias: metrics_backend
  - name: tempo-distributed
    version: 1.41.1
    repository: https://grafana.github.io/helm-charts
    condition: observability.traces.local_backend
    alias: traces_backend
  - name: minio
    version: 16.0.10
    repository: https://charts.bitnami.com/bitnami
    condition: observability.minio.enabled
    alias: minio
  - name: kube-state-metrics
    version: 5.36.0 
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.metrics.kubeStateMetrics.enabled
  - name: prometheus-postgres-exporter
    version: 6.10.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.metrics.postgres.enabled
    alias: postgresexporter
  - name: prometheus-redis-exporter
    version: 6.11.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.metrics.redis.enabled
    alias: redisexporter