{{- if .Values.config.auth.enabled }}
{{- $authSecret := lookup "v1" "Secret" (.Values.namespace | default .Release.Namespace) (include "missionControl.authSecretName" .) }}
{{- if not $authSecret }}
{{- $setupTokenSecretName := include "missionControl.setupTokenSecretName" . }}
{{- $existingSetupToken := lookup "v1" "Secret" (.Values.namespace | default .Release.Namespace) $setupTokenSecretName }}
{{- if not $existingSetupToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $setupTokenSecretName }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "missionControl.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with (include "missionControl.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  token: {{ randAlphaNum 43 }}
{{- end }}
{{- end }}
{{- end }}
