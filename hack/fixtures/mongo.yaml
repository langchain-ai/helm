apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/part-of: langgraph-cloud-local-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo
        app.kubernetes.io/part-of: langgraph-cloud-local-dev
    spec:
      containers:
      - name: mongo
        image: mongo:7
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 27017
          name: mongo
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
        startupProbe:
          tcpSocket:
            port: 27017
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          tcpSocket:
            port: 27017
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 27017
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/part-of: langgraph-cloud-local-dev
spec:
  selector:
    app.kubernetes.io/name: mongo
  ports:
  - name: mongo
    port: 27017
    targetPort: mongo
    protocol: TCP
